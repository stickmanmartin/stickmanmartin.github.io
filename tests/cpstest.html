    body {

        padding: 0;

    }

    /* Hide cursor on all interactives */

    }

<style>
    #neural-pointer {
        position: fixed;
        width: 32px;
        height: 32px;
        pointer-events: none;
        z-index: 9999999;
        transform: translate(0, 0);
        display: block;
        filter: 
            drop-shadow(0 0 10px var(--rainbow-glow, #38bdf8))
            drop-shadow(0 0 2px #fff) 
            drop-shadow(1px 0 0 #000) 
            drop-shadow(-1px 0 0 #000) 
            drop-shadow(0 1px 0 #000) 
            drop-shadow(0 -1px 0 #000);
    }
    #neural-pointer::before {
        content: '';
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        clip-path: polygon(0% 0%, 100% 70%, 40% 70%, 40% 100%);
        transition: background 0.3s ease;
    }
    
    #neural-pointer.day-mode::before { background: #ffffff; }
    #neural-pointer.night-mode::before { background: #000000; }

    *, html, body, a, button, input, select, textarea, canvas {
        cursor: none !important;
    }
</style>

<body>
  <header>
    <h1>Impulse Test</h1>
    <p class="subtitle">High-Frequency Click Per Second Analysis</p>
  </header>

  <main id="test-container">
    <div id="start-prompt">
        <div style="border: 2px solid var(--accent-facility); padding: 15px 30px; color: var(--accent-facility); font-weight: 700;">INITIALIZE IMPULSE</div>
    </div>

    <div id="click-area">CLICK REPEATEDLY</div>

    <div class="stats-bar">
      <div class="stat-box">
        <div id="cps" class="stat-val">0.0</div>
        <div class="stat-label">CPS</div>
      </div>
      <div class="stat-box">
        <div id="time" class="stat-val">10</div>
        <div class="stat-label">Seconds</div>
      </div>
    </div>
    <div id="highscore-display">Peak Impulse: 0.0 CPS</div>
  </main>

  <script src="facility_bg.js"></script>
  <script>
    const clickArea = document.getElementById('click-area');
    const cpsDisplay = document.getElementById('cps');
    const timeDisplay = document.getElementById('time');
    const startPrompt = document.getElementById('start-prompt');
    const highscoreDisplay = document.getElementById('highscore-display');

    let clicks = 0;
    let timeLeft = 10;
    let isActive = false;
    let timer;
    let highscore = localStorage.getItem('cpsHighscore') || 0;

    highscoreDisplay.textContent = `Peak Impulse: ${highscore} CPS`;

    function startTest() {
        isActive = true;
        clicks = 0;
        timeLeft = 10;
        startPrompt.style.display = 'none';
        timer = setInterval(updateTimer, 1000);
    }

    function updateTimer() {
        timeLeft--;
        timeDisplay.textContent = timeLeft;
        if (timeLeft <= 0) endTest();
    }

    function endTest() {
        clearInterval(timer);
        isActive = false;
        const finalCPS = (clicks / 10).toFixed(1);
        
        if (finalCPS > parseFloat(highscore)) {
            highscore = finalCPS;
            localStorage.setItem('cpsHighscore', highscore);
            highscoreDisplay.textContent = `Peak Impulse: ${highscore} CPS (NEW RECORD)`;
        }

        alert(`TEST COMPLETE\nTotal Clicks: ${clicks}\nCPS: ${finalCPS}`);
        startPrompt.style.display = 'flex';
        cpsDisplay.textContent = '0.0';
        timeDisplay.textContent = '10';
    }

    clickArea.addEventListener('mousedown', (e) => {
        if (!isActive) return;
        clicks++;
        cpsDisplay.textContent = (clicks / (10 - timeLeft || 0.1)).toFixed(1);
    });

    startPrompt.addEventListener('click', startTest);
  </script>

<div id="neural-pointer"></div>
<script>
    (function() {
        const pointer = document.getElementById('neural-pointer');
        if (!pointer) return;

        let hue = 0;

        function isDayTime() {
            const hour = new Date().getHours();
            return hour >= 6 && hour < 18;
        }

        function updatePointer() {
            const isDay = isDayTime();
            pointer.classList.toggle('day-mode', isDay);
            pointer.classList.toggle('night-mode', !isDay);

            hue = (hue + 2) % 360;
            // High lightness for daytime to prevent "dark" feel, standard for night
            const lightness = isDay ? 85 : 60; 
            pointer.style.setProperty('--rainbow-glow', `hsl(${hue}, 100%, ${lightness}%)`);
        }

        window.addEventListener('mousemove', (e) => {
            pointer.style.left = e.clientX + 'px';
            pointer.style.top = e.clientY + 'px';
        });

        function animate() {
            updatePointer();
            requestAnimationFrame(animate);
        }
        animate();
    })();
</script>
