<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CPS Test - Testing Facility</title>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
        --bg-facility: #141418;
        --card-facility: rgba(20, 20, 24, 0.8);
        --accent-facility: #38bdf8;
        --text-main: #f8fafc;
        --text-muted: #94a3b8;
    }

    body {
        font-family: 'Poppins', sans-serif;
        background-color: var(--bg-facility);
        color: var(--text-main);
        margin: 0;
        padding: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        overflow-x: hidden;
        cursor: none !important;
        perspective: 1000px;
    }

    /* Digital Vignette */
    body::before {
        content: '';
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: radial-gradient(circle at center, transparent 30%, rgba(0,0,0,0.5) 100%);
        pointer-events: none;
        z-index: 100;
    }

    /* Noise Overlay */
    body::after {
        content: '';
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        filter: url(#noise);
        opacity: 0.15;
        pointer-events: none;
        z-index: 99;
    }

    #facility-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        pointer-events: none;
        transform: rotateX(15deg) scale(1.1);
        transform-origin: top;
    }

    @keyframes rotatePointer {
        0% { transform: rotate(0deg) scale(1); }
        50% { transform: rotate(180deg) scale(1.1); }
        100% { transform: rotate(360deg) scale(1); }
    }

    /* Hide cursor on all interactives */
    a, button, input, select, textarea, [role="button"], #target, .cell {
        cursor: none !important;
    }

        /* Digital Vignette */

        /* Noise Overlay */

        50% { transform: rotate(180deg) scale(1.2); }
        100% { transform: rotate(360deg) scale(1); }
    }

    h1 {
      font-size: 3rem;
      font-weight: 800;
      background: linear-gradient(to right, #10b981, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 5px;
    }

    .subtitle {
      color: var(--text-muted);
      margin-bottom: 30px;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-size: 0.8rem;
    }

    #test-container {
      max-width: 500px;
      margin: 0 auto;
      background: var(--card-facility);
      padding: 40px;
      border-radius: 4px;
      border: 1px solid #2d2d35;
      box-shadow: 0 20px 50px rgba(0,0,0,0.8);
      position: relative;
    }

    #click-area {
      width: 100%;
      height: 250px;
      background: rgba(0,0,0,0.4);
      border: 2px dashed var(--accent-facility);
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      user-select: none;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent-facility);
      transition: all 0.1s;
    }

    #click-area:active {
      background: rgba(16, 185, 129, 0.1);
      transform: scale(0.98);
    }

    .stats-bar {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      margin-top: 30px;
    }

    .stat-box {
      background: rgba(0,0,0,0.3);
      padding: 15px;
      border: 1px solid #2d2d35;
    }

    .stat-val { font-size: 2.5rem; font-weight: 800; color: var(--accent-facility); }
    .stat-label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; }

    #highscore-display {
        margin-top: 20px;
        color: var(--accent-facility);
        font-family: 'Fira Code', monospace;
        font-size: 0.9rem;
    }

    #start-prompt {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(20, 20, 24, 0.9);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 10;
        cursor: pointer;
    }
  </style>

    <link rel="stylesheet" href="../hub-common.css">
</head>
<body>
  <header>
    <h1>Impulse Test</h1>
    <p class="subtitle">High-Frequency Click Per Second Analysis</p>
  </header>

  <main id="test-container">
    <div id="start-prompt">
        <div style="border: 2px solid var(--accent-facility); padding: 15px 30px; color: var(--accent-facility); font-weight: 700;">INITIALIZE IMPULSE</div>
    </div>

    <div id="click-area">CLICK REPEATEDLY</div>

    <div class="stats-bar">
      <div class="stat-box">
        <div id="cps" class="stat-val">0.0</div>
        <div class="stat-label">CPS</div>
      </div>
      <div class="stat-box">
        <div id="time" class="stat-val">10</div>
        <div class="stat-label">Seconds</div>
      </div>
    </div>
    <div id="highscore-display">Peak Impulse: 0.0 CPS</div>
  </main>

  <script src="facility_bg.js"></script>
  <script>
    const clickArea = document.getElementById('click-area');
    const cpsDisplay = document.getElementById('cps');
    const timeDisplay = document.getElementById('time');
    const startPrompt = document.getElementById('start-prompt');
    const highscoreDisplay = document.getElementById('highscore-display');

    let clicks = 0;
    let timeLeft = 10;
    let isActive = false;
    let timer;
    let highscore = localStorage.getItem('cpsHighscore') || 0;

    highscoreDisplay.textContent = `Peak Impulse: ${highscore} CPS`;

    function startTest() {
        isActive = true;
        clicks = 0;
        timeLeft = 10;
        startPrompt.style.display = 'none';
        timer = setInterval(updateTimer, 1000);
    }

    function updateTimer() {
        timeLeft--;
        timeDisplay.textContent = timeLeft;
        if (timeLeft <= 0) endTest();
    }

    function endTest() {
        clearInterval(timer);
        isActive = false;
        const finalCPS = (clicks / 10).toFixed(1);
        
        if (finalCPS > parseFloat(highscore)) {
            highscore = finalCPS;
            localStorage.setItem('cpsHighscore', highscore);
            highscoreDisplay.textContent = `Peak Impulse: ${highscore} CPS (NEW RECORD)`;
        }

        alert(`TEST COMPLETE\nTotal Clicks: ${clicks}\nCPS: ${finalCPS}`);
        startPrompt.style.display = 'flex';
        cpsDisplay.textContent = '0.0';
        timeDisplay.textContent = '10';
    }

    clickArea.addEventListener('mousedown', (e) => {
        if (!isActive) return;
        clicks++;
        cpsDisplay.textContent = (clicks / (10 - timeLeft || 0.1)).toFixed(1);
    });

    startPrompt.addEventListener('click', startTest);
  </script>

<style>

</style>

    <!-- Atmospheric Post-Processing Filters -->
    <svg style="display: none;">
        <filter id="noise">
            <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" />
            <feColorMatrix type="saturate" values="0" />
            <feComponentTransfer>
                <feFuncR type="linear" slope="0.1" />
                <feFuncG type="linear" slope="0.1" />
                <feFuncB type="linear" slope="0.1" />
            </feComponentTransfer>
        </filter>
    </svg>

    <script src="../hub-common.js"></script>
