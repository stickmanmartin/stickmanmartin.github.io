<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Memory Test Game</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
    }
    h1 {
      margin: 20px 0;
      font-size: 2.5em;
      text-shadow: 0 2px 5px rgba(0,0,0,0.3);
    }
    #Home {
    position: fixed; /* Fixes the button position relative to the viewport */
    bottom: 20px; /* Distance from the bottom edge of the viewport */
    right: 20px; /* Distance from the right edge of the viewport */
    width: 50px;
    height: 50px;
    border: 2px solid #000000;
    border-radius: 50%;
    background-color: rgb(255, 0, 0);
    display: flex;
    justify-content: center;
    align-items: center;
    text-decoration: none;
    color: #fff;
    font-size: 18px;
    z-index: 1000;
    }
    #game {
      display: grid;
      grid-template-columns: repeat(2, 150px);
      grid-template-rows: repeat(2, 150px);
      gap: 15px;
      margin: 40px auto;
      width: fit-content;
      padding: 20px;
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      backdrop-filter: blur(10px);
    }
    .cell {
      width: 150px;
      height: 150px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }
    .cell:hover { transform: scale(1.05); }
    .cell:active { transform: scale(0.95); }

    /* Colors */
    #red { background: #e74c3c; }
    #blue { background: #3498db; }
    #green { background: #2ecc71; }
    #yellow { background: #f1c40f; }

    .active { 
      transform: scale(1.1); 
      box-shadow: 0 0 30px 5px white !important;
      filter: brightness(1.5);
    }

    #controls {
      margin: 30px;
    }
    button {
      padding: 12px 30px;
      font-size: 18px;
      margin: 10px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      background: white;
      color: #764ba2;
      font-weight: bold;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      transition: all 0.3s;
    }
    button:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    #status {
      font-size: 1.4em;
      margin: 20px;
      min-height: 30px;
    }
    #score {
      font-size: 1.6em;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>🧠 Memory Test</h1>
  <p>Watch the sequence... then repeat it!</p>

  <div id="game">
    <div class="cell" id="red"></div>
    <div class="cell" id="blue"></div>
    <div class="cell" id="green"></div>
    <div class="cell" id="yellow"></div>
  </div>

  <div id="controls">
    <button id="startBtn">Start Game</button>
    <button id="resetBtn" style="display:none;">Play Again</button>
  </div>

  <div id="status">Click "Start Game" to begin!</div>
  <div id="score">Level: 0</div>

  <script>
    const cells = document.querySelectorAll('.cell');
    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');
    const status = document.getElementById('status');
    const scoreDisplay = document.getElementById('score');

    let sequence = [];
    let playerSequence = [];
    let level = 0;
    let isPlaying = false;
    let isPlayerTurn = false;

    const colors = ['red', 'blue', 'green', 'yellow'];
    const cellMap = {
      red: document.getElementById('red'),
      blue: document.getElementById('blue'),
      green: document.getElementById('green'),
      yellow: document.getElementById('yellow')
    };

    function flash(cellId, duration = 400) {
      return new Promise(resolve => {
        const cell = cellMap[cellId];
        cell.classList.add('active');
        setTimeout(() => {
          cell.classList.remove('active');
          setTimeout(resolve, 200);
        }, duration);
      });
    }

    async function playSequence() {
      isPlaying = true;
      status.textContent = "Watch carefully...";
      playerSequence = [];

      for (let color of sequence) {
        await flash(color);
      }

      isPlaying = false;
      isPlayerTurn = true;
      status.textContent = "Your turn! Click the colors in order.";
    }

    function addToSequence() {
      const randomColor = colors[Math.floor(Math.random() * colors.length)];
      sequence.push(randomColor);
    }

    function startGame() {
      sequence = [];
      level = 0;
      startBtn.style.display = 'none';
      resetBtn.style.display = 'inline-block';
      nextLevel();
    }

    async function nextLevel() {
      level++;
      scoreDisplay.textContent = `Level: ${level}`;
      status.textContent = `Get ready for level ${level}...`;
      addToSequence();

      await new Promise(r => setTimeout(r, 1000));
      await playSequence();
    }

    function gameOver() {
      isPlayerTurn = false;
      status.innerHTML = `<strong>Game Over!</strong> You reached level <strong>${level}</strong>.`;
      startBtn.style.display = 'inline-block';
      resetBtn.style.display = 'none';
      setTimeout(() => {
        if (confirm(`Great job! You remembered ${level} steps!\n\nWant to play again?`)) {
          startGame();
        } else {
          status.textContent = "Thanks for playing! Click 'Start Game' to try again.";
          startBtn.style.display = 'inline-block';
          resetBtn.style.display = 'none';
        }
      }, 500);
    }

    cells.forEach(cell => {
      cell.addEventListener('click', () => {
        if (!isPlayerTurn || isPlaying) return;

        const color = cell.id;
        playerSequence.push(color);
        flash(color, 200);

        // Check if current click is correct
        const index = playerSequence.length - 1;
        if (playerSequence[index] !== sequence[index]) {
          gameOver();
          return;
        }

        // If player completed the sequence
        if (playerSequence.length === sequence.length) {
          isPlayerTurn = false;
          status.textContent = "Correct! Get ready for the next level...";
          setTimeout(nextLevel, 1500);
        }
      });
    });

    startBtn.addEventListener('click', startGame);
    resetBtn.addEventListener('click', startGame);
  </script>
        <a id="Home" href="../../index.html">Home</a>
</body>
</html>
