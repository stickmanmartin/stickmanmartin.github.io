<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cognitive Memory - Testing Facility</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0f172a;
      --card-bg: #1e293b;
      --accent: #a78bfa;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }

    body {
      font-family: 'Poppins', sans-serif;
      text-align: center;
      background-color: var(--bg-facility);
      color: var(--text-main);
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      overflow-x: hidden;
      cursor: none;
    }

    #facility-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        pointer-events: none;
    }

    #facility-pointer {
        position: fixed;
        width: 12px;
        height: 12px;
        background: #fff;
        border-radius: 50%;
        pointer-events: none;
        z-index: 10001;
        mix-blend-mode: screen;
        box-shadow: 
            0 0 10px #fff,
            0 0 20px #a78bfa,
            0 0 40px rgba(167, 139, 250, 0.5);
        transform: translate(-50%, -50%);
    }

    h1 {
      font-size: 3rem;
      font-weight: 800;
      background: linear-gradient(to right, #a78bfa, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }

    .subtitle {
      color: var(--text-muted);
      margin-bottom: 30px;
    }

    #game-container {
      max-width: 500px;
      margin: 0 auto;
      background: var(--card-bg);
      padding: 30px;
      border-radius: 20px;
      border: 1px solid #334155;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    #game {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      margin: 20px auto;
      width: 100%;
    }

    .cell {
      aspect-ratio: 1/1;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      border: 2px solid transparent;
      opacity: 0.8;
    }

    .cell:hover { transform: scale(1.02); opacity: 1; }
    .cell:active { transform: scale(0.95); }

    /* Colors */
    #red { background: #ef4444; box-shadow: 0 0 10px rgba(239, 68, 68, 0.3); }
    #blue { background: #3b82f6; box-shadow: 0 0 10px rgba(59, 130, 246, 0.3); }
    #green { background: #10b981; box-shadow: 0 0 10px rgba(16, 185, 129, 0.3); }
    #yellow { background: #f59e0b; box-shadow: 0 0 10px rgba(245, 158, 11, 0.3); }

    .active { 
      transform: scale(1.05); 
      box-shadow: 0 0 40px 10px white !important;
      filter: brightness(1.5);
      opacity: 1;
      z-index: 2;
    }

    #controls {
      margin-top: 30px;
    }

    #startBtn, #resetBtn {
      padding: 12px 30px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      background: white;
      color: var(--bg-dark);
      border: none;
      border-radius: 50px;
      box-shadow: 0 4px 15px rgba(255,255,255,0.2);
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #startBtn:hover, #resetBtn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255,255,255,0.4);
    }

    #status {
      font-size: 1.1rem;
      margin: 20px;
      min-height: 25px;
      color: var(--text-muted);
    }

    #score {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--accent);
    }

    #highscore-display {
      margin-top: 10px;
      font-size: 0.9rem;
      color: #10b981;
    }
  </style>
</head>
<body>
  <header>
    <h1>Cognitive Memory</h1>
    <p class="subtitle">Neural Sequence Retention Analysis</p>
  </header>

  <main id="game-container">
    <div id="score">Level: 0</div>
    <div id="highscore-display">Best Level: 0</div>
    
    <div id="status">Initialize Cognitive Protocol</div>

    <div id="game">
      <div class="cell" id="red"></div>
      <div class="cell" id="blue"></div>
      <div class="cell" id="green"></div>
      <div class="cell" id="yellow"></div>
    </div>

    <div id="controls">
      <button id="startBtn">Begin Analysis</button>
      <button id="resetBtn" style="display:none;">Restart Protocol</button>
    </div>
  </main>

  <script src="facility_bg.js"></script>
  <script>
    const cells = document.querySelectorAll('.cell');
    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');
    const status = document.getElementById('status');
    const scoreDisplay = document.getElementById('score');
    const highscoreDisplay = document.getElementById('highscore-display');

    let sequence = [];
    let playerSequence = [];
    let level = 0;
    let isPlaying = false;
    let isPlayerTurn = false;

    // Load Highscore
    let highscore = localStorage.getItem('memoryTestHighscore') || 0;
    highscoreDisplay.textContent = `Best Level: ${highscore}`;

    const colors = ['red', 'blue', 'green', 'yellow'];
    const cellMap = {
      red: document.getElementById('red'),
      blue: document.getElementById('blue'),
      green: document.getElementById('green'),
      yellow: document.getElementById('yellow')
    };

    function flash(cellId, duration = 400) {
      return new Promise(resolve => {
        const cell = cellMap[cellId];
        cell.classList.add('active');
        setTimeout(() => {
          cell.classList.remove('active');
          setTimeout(resolve, 200);
        }, duration);
      });
    }

    async function playSequence() {
      isPlaying = true;
      status.textContent = "Data Transmission in Progress...";
      playerSequence = [];

      for (let color of sequence) {
        await flash(color);
      }

      isPlaying = false;
      isPlayerTurn = true;
      status.textContent = "Replicate Sequence";
    }

    function addToSequence() {
      const randomColor = colors[Math.floor(Math.random() * colors.length)];
      sequence.push(randomColor);
    }

    function startGame() {
      sequence = [];
      level = 0;
      startBtn.style.display = 'none';
      resetBtn.style.display = 'inline-block';
      nextLevel();
    }

    async function nextLevel() {
      level++;
      scoreDisplay.textContent = `Level: ${level}`;
      status.textContent = `Preparing Level ${level}...`;
      addToSequence();

      await new Promise(r => setTimeout(r, 1000));
      await playSequence();
    }

    function gameOver() {
      isPlayerTurn = false;
      status.innerHTML = `<span style="color:#ef4444">CRITICAL ERROR: Protocol Failed</span>`;
      
      if (level > highscore) {
        highscore = level;
        localStorage.setItem('memoryTestHighscore', highscore);
        highscoreDisplay.textContent = `New Best: ${highscore}`;
      }

      setTimeout(() => {
        alert(`ANALYSIS COMPLETE\nLevels Cleared: ${level}`);
        startBtn.style.display = 'inline-block';
        resetBtn.style.display = 'none';
        startBtn.textContent = "Re-Initialize";
      }, 500);
    }

    cells.forEach(cell => {
      cell.addEventListener('click', () => {
        if (!isPlayerTurn || isPlaying) return;

        const color = cell.id;
        playerSequence.push(color);
        flash(color, 200);

        const index = playerSequence.length - 1;
        if (playerSequence[index] !== sequence[index]) {
          gameOver();
          return;
        }

        if (playerSequence.length === sequence.length) {
          isPlayerTurn = false;
          status.textContent = "Validation Successful";
          setTimeout(nextLevel, 1200);
        }
      });
    });

    startBtn.addEventListener('click', startGame);
    resetBtn.addEventListener('click', startGame);
  </script>

<!-- Global Hub Navigation -->
<style>
    .global-hub-btn {
        position: fixed;
        bottom: 25px;
        right: 25px;
        background: linear-gradient(135deg, #00f2ff 0%, #0077ff 100%);
        color: white !important;
        text-decoration: none !important;
        padding: 14px 28px;
        border-radius: 50px;
        font-family: 'Poppins', 'Segoe UI', sans-serif;
        font-weight: 800;
        font-size: 13px;
        letter-spacing: 1.5px;
        box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
        z-index: 1000000;
        border: 2px solid rgba(255, 255, 255, 0.8);
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        display: flex;
        align-items: center;
        gap: 10px;
        text-transform: uppercase;
        cursor: pointer;
    }
    .global-hub-btn:hover {
        transform: scale(1.1) translateY(-5px);
        box-shadow: 0 15px 30px rgba(0, 242, 255, 0.6);
        background: linear-gradient(135deg, #0077ff 0%, #00f2ff 100%);
        border-color: #fff;
    }
    .global-hub-btn::before {
        content: '🏠';
        font-size: 18px;
    }
    
    .facility-nav {
        position: fixed;
        top: 25px;
        left: 25px;
        background: rgba(30, 41, 59, 0.8);
        padding: 10px 20px;
        border-radius: 12px;
        border: 1px solid #334155;
        backdrop-filter: blur(5px);
        z-index: 1000;
        display: flex;
        gap: 15px;
    }
    
    .facility-nav a {
        color: var(--text-muted);
        text-decoration: none;
        font-size: 0.9rem;
        font-weight: 600;
        transition: color 0.3s;
    }
    
    .facility-nav a:hover {
        color: var(--accent);
    }
</style>

<div class="facility-nav">
    <a href="tests.html">Facility Dashboard</a>
    <a href="clickspeed.html">Reflex Test</a>
</div>

<a href="../index.html" class="global-hub-btn">Back to Hub</a>
</body>
</html>
