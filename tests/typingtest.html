<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Neural Typing - Testing Facility</title>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-facility: #0a0a0c;
      --card-facility: #141418;
      --accent-facility: #f59e0b; /* Scientific Orange */
      --text-main: #e2e8f0;
      --text-muted: #94a3b8;
    }

    body {
      font-family: 'Poppins', sans-serif;
      text-align: center;
      background-color: var(--bg-facility);
      color: var(--text-main);
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      overflow-x: hidden;
      cursor: none;
    }

    #facility-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        pointer-events: none;
    }

    #facility-pointer {
        position: fixed;
        width: 12px;
        height: 12px;
        background: #fff;
        border-radius: 50%;
        pointer-events: none;
        z-index: 10001;
        mix-blend-mode: screen;
        box-shadow: 
            0 0 10px #fff,
            0 0 20px #f59e0b,
            0 0 40px rgba(245, 158, 11, 0.5);
        transform: translate(-50%, -50%);
    }

    h1 {
      font-size: 3rem;
      font-weight: 800;
      background: linear-gradient(to right, #f59e0b, #ef4444);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 5px;
    }

    .subtitle {
      color: var(--text-muted);
      margin-bottom: 30px;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-size: 0.8rem;
    }

    #test-container {
      max-width: 800px;
      margin: 0 auto;
      background: var(--card-facility);
      padding: 40px;
      border-radius: 4px; /* Industrial sharp corners */
      border: 1px solid #2d2d35;
      box-shadow: 0 20px 50px rgba(0,0,0,0.8);
      position: relative;
    }

    #test-container::before {
        content: 'UNIT: TYPING_EFFICIENCY_v2.0';
        position: absolute;
        top: 10px;
        left: 10px;
        font-family: 'Fira Code', monospace;
        font-size: 0.6rem;
        color: var(--accent-facility);
        opacity: 0.5;
    }

    #text-display {
      font-family: 'Fira Code', monospace;
      font-size: 1.4rem;
      text-align: left;
      line-height: 1.6;
      background: rgba(0,0,0,0.4);
      padding: 25px;
      border-radius: 4px;
      margin-bottom: 25px;
      border-left: 4px solid var(--accent-facility);
      user-select: none;
    }

    .char { color: var(--text-muted); border-bottom: 2px solid transparent; }
    .correct { color: #10b981; }
    .incorrect { color: #ef4444; background: rgba(239, 68, 68, 0.2); }
    .current { border-bottom: 2px solid var(--accent-facility); animation: blink 1s infinite; }

    @keyframes blink { 50% { border-color: transparent; } }

    #input-area {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .stats-bar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-top: 30px;
    }

    .stat-box {
      background: rgba(0,0,0,0.3);
      padding: 15px;
      border: 1px solid #2d2d35;
    }

    .stat-val { font-size: 2rem; font-weight: 800; color: var(--accent-facility); }
    .stat-label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; }

    #highscore-display {
        margin-top: 20px;
        color: #10b981;
        font-size: 0.9rem;
        font-family: 'Fira Code', monospace;
    }

    #start-prompt {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(20, 20, 24, 0.9);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 10;
        cursor: pointer;
        backdrop-filter: blur(4px);
    }

    .prompt-text {
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--accent-facility);
        border: 2px solid var(--accent-facility);
        padding: 15px 30px;
        text-transform: uppercase;
    }
  </style>
</head>
<body>
  <header>
    <h1>Neural Typing</h1>
    <p class="subtitle">Manual Data Entry Synchronization Analysis</p>
  </header>

  <main id="test-container">
    <div id="start-prompt">
        <div class="prompt-text">Click to Initialize Test</div>
    </div>

    <div id="text-display"></div>
    <textarea id="input-area" spellcheck="false"></textarea>

    <div class="stats-bar">
      <div class="stat-box">
        <div id="wpm" class="stat-val">0</div>
        <div class="stat-label">WPM</div>
      </div>
      <div class="stat-box">
        <div id="accuracy" class="stat-val">100%</div>
        <div class="stat-label">Accuracy</div>
      </div>
      <div class="stat-box">
        <div id="time" class="stat-val">60</div>
        <div class="stat-label">Seconds</div>
      </div>
    </div>
    <div id="highscore-display">Peak Efficiency: 0 WPM</div>
  </main>

  <script src="facility_bg.js"></script>
  <script>
    const textDisplay = document.getElementById('text-display');
    const inputArea = document.getElementById('input-area');
    const wpmDisplay = document.getElementById('wpm');
    const accDisplay = document.getElementById('accuracy');
    const timeDisplay = document.getElementById('time');
    const startPrompt = document.getElementById('start-prompt');
    const highscoreDisplay = document.getElementById('highscore-display');

    const sampleTexts = [
        "The quick brown fox jumps over the lazy dog.",
        "Programming is not just about writing code; it is about solving problems creatively.",
        "The beauty of a flock of birds lies in the simple mathematical rules each individual follows.",
        "Neural networks attempt to mimic the complex architecture of the human brain to process data.",
        "Security and performance are the two pillars of high-quality software engineering."
    ];

    let timer;
    let timeLeft = 60;
    let isActive = false;
    let currentText = "";
    let charIndex = 0;
    let totalErrors = 0;
    let totalCorrectChars = 0;
    let highscore = localStorage.getItem('typingHighscore') || 0;

    highscoreDisplay.textContent = `Peak Efficiency: ${highscore} WPM`;

    function loadNewText() {
        currentText = sampleTexts[Math.floor(Math.random() * sampleTexts.length)];
        textDisplay.innerHTML = "";
        currentText.split('').forEach(char => {
            const span = document.createElement('span');
            span.classList.add('char');
            span.innerText = char;
            textDisplay.appendChild(span);
        });
        textDisplay.children[0].classList.add('current');
        charIndex = 0;
        inputArea.value = "";
    }

    function initTest() {
        loadNewText();
        totalErrors = 0;
        totalCorrectChars = 0;
        timeLeft = 60;
        wpmDisplay.textContent = '0';
        accDisplay.textContent = '100%';
        timeDisplay.textContent = '60';
        inputArea.value = "";
    }

    function startTest() {
        initTest();
        isActive = true;
        startPrompt.style.display = 'none';
        inputArea.focus();
        timer = setInterval(updateTimer, 1000);
    }

    function updateTimer() {
        if (timeLeft > 0) {
            timeLeft--;
            timeDisplay.textContent = timeLeft;
            calculateStats();
        } else {
            endTest();
        }
    }

    function calculateStats() {
        const timeElapsed = (60 - timeLeft) / 60;
        const wpm = Math.round((totalCorrectChars / 5) / (timeElapsed || 0.01));
        wpmDisplay.textContent = Math.max(0, wpm);
        
        const totalTyped = totalCorrectChars + totalErrors;
        const accuracy = Math.round((totalCorrectChars / (totalTyped || 1)) * 100);
        accDisplay.textContent = Math.max(0, accuracy) + '%';
    }

    function endTest() {
        clearInterval(timer);
        isActive = false;
        inputArea.blur();
        
        const finalWpm = parseInt(wpmDisplay.textContent);
        if (finalWpm > highscore) {
            highscore = finalWpm;
            localStorage.setItem('typingHighscore', highscore);
            highscoreDisplay.textContent = `Peak Efficiency: ${highscore} WPM (NEW RECORD)`;
        }

        alert(`TEST COMPLETE\nWPM: ${finalWpm}\nAccuracy: ${accDisplay.textContent}`);
        startPrompt.style.display = 'flex';
        initTest();
    }

    inputArea.addEventListener('input', () => {
        if (!isActive) return;
        
        const typedValue = inputArea.value;
        const chars = textDisplay.querySelectorAll('.char');
        const typedChar = typedValue[typedValue.length - 1];

        if (charIndex < currentText.length) {
            if (typedChar === currentText[charIndex]) {
                chars[charIndex].classList.add('correct');
                totalCorrectChars++;
            } else {
                chars[charIndex].classList.add('incorrect');
                totalErrors++;
            }
            chars[charIndex].classList.remove('current');
            charIndex++;
            
            if (charIndex < currentText.length) {
                chars[charIndex].classList.add('current');
                inputArea.value = typedValue; // Keep text
            } else {
                // Text finished, load another one
                loadNewText();
            }
        }
    });

    startPrompt.addEventListener('click', startTest);
    
    // Prevent backspace to keep it simple and high-stakes
    inputArea.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace') e.preventDefault();
    });

    initTest();
  </script>

<style>

        position: fixed;
        bottom: 25px;
        left: 25px;
        background: rgba(15, 23, 42, 0.9);

</style>
