    body {

        background-color: var(--bg-facility);
        color: var(--text-main);
        margin: 0;
        padding: 0;

    /* Digital Vignette */

    }

    /* Hide cursor on all interactives */

        cursor: none !important;
    }

    .char { color: var(--text-muted); border-bottom: 2px solid transparent; }

<style>
    #neural-pointer {
        position: fixed;
        width: 32px;
        height: 32px;
        pointer-events: none;
        z-index: 9999999;
        transform: translate(0, 0);
        display: block;
        filter: 
            drop-shadow(0 0 10px var(--rainbow-glow, #38bdf8))
            drop-shadow(0 0 2px #fff) 
            drop-shadow(1px 0 0 #000) 
            drop-shadow(-1px 0 0 #000) 
            drop-shadow(0 1px 0 #000) 
            drop-shadow(0 -1px 0 #000);
    }
    #neural-pointer::before {
        content: '';
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        clip-path: polygon(0% 0%, 100% 70%, 40% 70%, 40% 100%);
        transition: background 0.3s ease;
    }
    
    #neural-pointer.day-mode::before { background: #ffffff; }
    #neural-pointer.night-mode::before { background: #000000; }

    *, html, body, a, button, input, select, textarea, canvas {
        cursor: none !important;
    }
</style>

  <header>

  </header>

  <main id="test-container">
    <div id="start-prompt">
        <div class="prompt-text">Click to Initialize Test</div>
    </div>

    <div id="text-display"></div>
    <textarea id="input-area" spellcheck="false"></textarea>

    <div class="stats-bar">
      <div class="stat-box">
        <div id="wpm" class="stat-val">0</div>
        <div class="stat-label">WPM</div>
      </div>
      <div class="stat-box">
        <div id="accuracy" class="stat-val">100%</div>
        <div class="stat-label">Accuracy</div>
      </div>
      <div class="stat-box">
        <div id="time" class="stat-val">60</div>
        <div class="stat-label">Seconds</div>
      </div>
    </div>
    <div id="highscore-display">Peak Efficiency: 0 WPM</div>
  </main>

  <script src="facility_bg.js"></script>
  <script>
    const textDisplay = document.getElementById('text-display');
    const inputArea = document.getElementById('input-area');
    const wpmDisplay = document.getElementById('wpm');
    const accDisplay = document.getElementById('accuracy');
    const timeDisplay = document.getElementById('time');
    const startPrompt = document.getElementById('start-prompt');
    const highscoreDisplay = document.getElementById('highscore-display');

    const sampleTexts = [
        "The quick brown fox jumps over the lazy dog.",
        "Programming is not just about writing code; it is about solving problems creatively.",
        "The beauty of a flock of birds lies in the simple mathematical rules each individual follows.",
        "Neural networks attempt to mimic the complex architecture of the human brain to process data.",
        "Security and performance are the two pillars of high-quality software engineering."
    ];

    let timer;
    let timeLeft = 60;
    let isActive = false;
    let currentText = "";
    let charIndex = 0;
    let totalErrors = 0;
    let totalCorrectChars = 0;
    let highscore = localStorage.getItem('typingHighscore') || 0;

    highscoreDisplay.textContent = `Peak Efficiency: ${highscore} WPM`;

    function loadNewText() {
        currentText = sampleTexts[Math.floor(Math.random() * sampleTexts.length)];
        textDisplay.innerHTML = "";
        currentText.split('').forEach(char => {
            const span = document.createElement('span');
            span.classList.add('char');
            span.innerText = char;
            textDisplay.appendChild(span);
        });
        textDisplay.children[0].classList.add('current');
        charIndex = 0;
        inputArea.value = "";
    }

    function initTest() {
        loadNewText();
        totalErrors = 0;
        totalCorrectChars = 0;
        timeLeft = 60;
        wpmDisplay.textContent = '0';
        accDisplay.textContent = '100%';
        timeDisplay.textContent = '60';
        inputArea.value = "";
    }

    function startTest() {
        initTest();
        isActive = true;
        startPrompt.style.display = 'none';
        inputArea.focus();
        timer = setInterval(updateTimer, 1000);
    }

    function updateTimer() {
        if (timeLeft > 0) {
            timeLeft--;
            timeDisplay.textContent = timeLeft;
            calculateStats();
        } else {
            endTest();
        }
    }

    function calculateStats() {
        const timeElapsed = (60 - timeLeft);
        if (timeElapsed > 0) {
            const wpm = Math.round((totalCorrectChars / 5) / (timeElapsed / 60));
            wpmDisplay.textContent = Math.max(0, wpm);
            
            // Real-time highscore update
            if (wpm > highscore) {
                highscore = wpm;
                localStorage.setItem('typingHighscore', highscore);
                highscoreDisplay.textContent = `Peak Efficiency: ${highscore} WPM (NEW RECORD)`;
            }
        }
        
        const totalTyped = totalCorrectChars + totalErrors;
        const accuracy = Math.round((totalCorrectChars / (totalTyped || 1)) * 100);
        accDisplay.textContent = Math.max(0, accuracy) + '%';
    }

    function endTest() {
        clearInterval(timer);
        isActive = false;
        inputArea.blur();
        
        const finalWpm = parseInt(wpmDisplay.textContent);
        alert(`TEST COMPLETE\nWPM: ${finalWpm}\nAccuracy: ${accDisplay.textContent}`);
        startPrompt.style.display = 'flex';
        initTest();
    }

    inputArea.addEventListener('input', () => {
        if (!isActive) return;
        
        const typedValue = inputArea.value;
        const chars = textDisplay.querySelectorAll('.char');
        
        // Match typed text to current text
        let correctSoFar = 0;
        let errorsSoFar = 0;
        
        for (let i = 0; i < typedValue.length; i++) {
            if (i >= currentText.length) break;
            if (typedValue[i] === currentText[i]) {
                chars[i].className = 'char correct';
                correctSoFar++;
            } else {
                chars[i].className = 'char incorrect';
                errorsSoFar++;
            }
        }
        
        // Reset remaining chars
        for (let i = typedValue.length; i < currentText.length; i++) {
            chars[i].className = 'char';
        }
        
        charIndex = typedValue.length;
        if (charIndex < currentText.length) {
            chars[charIndex].classList.add('current');
        }

        totalCorrectChars = correctSoFar;
        totalErrors = errorsSoFar;
        calculateStats();

        if (charIndex >= currentText.length) {
            // Text finished, load another one
            loadNewText();
        }
    });

    startPrompt.addEventListener('click', startTest);
    
    // Support backspace for a better experience
    inputArea.addEventListener('keydown', (e) => {
        if (!isActive) e.preventDefault();
    });

    initTest();
  </script>

<div id="neural-pointer"></div>
<script>
    (function() {
        const pointer = document.getElementById('neural-pointer');
        if (!pointer) return;

        let hue = 0;

        function isDayTime() {
            const hour = new Date().getHours();
            return hour >= 6 && hour < 18;
        }

        function updatePointer() {
            const isDay = isDayTime();
            pointer.classList.toggle('day-mode', isDay);
            pointer.classList.toggle('night-mode', !isDay);

            hue = (hue + 2) % 360;
            // High lightness for daytime to prevent "dark" feel, standard for night
            const lightness = isDay ? 85 : 60; 
            pointer.style.setProperty('--rainbow-glow', `hsl(${hue}, 100%, ${lightness}%)`);
        }

        window.addEventListener('mousemove', (e) => {
            pointer.style.left = e.clientX + 'px';
            pointer.style.top = e.clientY + 'px';
        });

        function animate() {
            updatePointer();
            requestAnimationFrame(animate);
        }
        animate();
    })();
</script>
