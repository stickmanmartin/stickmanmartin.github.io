<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reflex Analysis - Testing Facility</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
        --bg-facility: #141418;
        --card-facility: rgba(20, 20, 24, 0.8);
        --accent-facility: #38bdf8;
        --text-main: #f8fafc;
        --text-muted: #94a3b8;
    }

    body {
        font-family: 'Poppins', sans-serif;
        background-color: var(--bg-facility);
        color: var(--text-main);
        margin: 0;
        padding: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        overflow-x: hidden;
        cursor: none !important;
        perspective: 1000px;
    }

    /* Digital Vignette */
    body::before {
        content: '';
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: radial-gradient(circle at center, transparent 30%, rgba(0,0,0,0.5) 100%);
        pointer-events: none;
        z-index: 100;
    }

    /* Noise Overlay */
    body::after {
        content: '';
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        filter: url(#noise);
        opacity: 0.15;
        pointer-events: none;
        z-index: 99;
    }

    #facility-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        pointer-events: none;
        transform: rotateX(15deg) scale(1.1);
        transform-origin: top;
    }

    @keyframes rotatePointer {
        0% { transform: rotate(0deg) scale(1); }
        50% { transform: rotate(180deg) scale(1.1); }
        100% { transform: rotate(360deg) scale(1); }
    }

    /* Hide cursor on all interactives */
    a, button, input, select, textarea, [role="button"], #target, .cell {
        cursor: none !important;
    }

        /* Digital Vignette */

        /* Noise Overlay */

        50% { transform: rotate(180deg) scale(1.2); }
        100% { transform: rotate(360deg) scale(1); }
    }

    h1 {
      font-size: 3rem;
      font-weight: 800;
      background: linear-gradient(to right, #38bdf8, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }

    .subtitle {
      color: var(--text-muted);
      margin-bottom: 30px;
    }

    #game-container {
      max-width: 600px;
      margin: 0 auto;
      background: var(--card-bg);
      padding: 30px;
      border-radius: 20px;
      border: 1px solid #334155;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    #game {
      margin: 20px auto;
      width: 100%;
      height: 400px;
      border: 2px solid var(--accent);
      position: relative;
      overflow: hidden;
      background: rgba(0,0,0,0.3);
      border-radius: 12px;
      box-shadow: inset 0 0 20px rgba(56, 189, 248, 0.2);
    }

    #target {
      width: 70px;
      height: 70px;
      background: var(--accent);
      color: var(--bg-dark);
      font-weight: 800;
      line-height: 70px;
      text-align: center;
      border-radius: 50%;
      position: absolute;
      cursor: crosshair;
      user-select: none;
      transition: transform 0.1s;
      box-shadow: 0 0 20px var(--accent);
      z-index: 10;
    }

    #target:active { transform: scale(0.9); }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: rgba(0,0,0,0.2);
      padding: 15px;
      border-radius: 12px;
      border: 1px solid #334155;
    }

    .stat-label {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .stat-value {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--accent);
    }

    #startBtn {
      padding: 15px 40px;
      font-size: 1.2rem;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(135deg, #38bdf8 0%, #0077ff 100%);
      color: white;
      border: none;
      border-radius: 50px;
      box-shadow: 0 10px 20px rgba(0, 119, 255, 0.3);
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    #startBtn:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 30px rgba(0, 119, 255, 0.5);
    }

    #startBtn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    #highscore-display {
      margin-top: 20px;
      font-size: 1rem;
      color: #10b981;
      font-weight: 600;
    }
  </style>

    <link rel="stylesheet" href="../hub-common.css">
</head>
<body>
  <header>
    <h1>Reflex Analysis</h1>
    <p class="subtitle">Neural Response Synchronization Test</p>
  </header>

  <main id="game-container">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Current Score</div>
        <div id="score" class="stat-value">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Time Remaining</div>
        <div id="timer" class="stat-value">10s</div>
      </div>
    </div>

    <button id="startBtn">Initialize Test</button>
    <div id="highscore-display">Highscore: 0</div>

    <div id="game">
      <div id="target">SYNC</div>
    </div>
  </main>

  <script src="facility_bg.js"></script>
  <script>
    const target = document.getElementById('target');
    const scoreDisplay = document.getElementById('score');
    const timerDisplay = document.getElementById('timer');
    const startBtn = document.getElementById('startBtn');
    const gameArea = document.getElementById('game');
    const highscoreDisplay = document.getElementById('highscore-display');

    let score = 0;
    let timeLeft = 10;
    let gameActive = false;
    let timer;

    // Load Highscore
    let highscore = localStorage.getItem('clickSpeedHighscore') || 0;
    highscoreDisplay.textContent = `Highscore: ${highscore}`;

    function randomPosition() {
      const maxX = gameArea.clientWidth - target.clientWidth;
      const maxY = gameArea.clientHeight - target.clientHeight;
      const x = Math.random() * maxX;
      const y = Math.random() * maxY;
      target.style.left = x + 'px';
      target.style.top = y + 'px';
      target.style.display = 'block';
    }

    function startGame() {
      if (gameActive) return;
      gameActive = true;
      score = 0;
      timeLeft = 10;
      scoreDisplay.textContent = '0';
      timerDisplay.textContent = '10s';
      startBtn.disabled = true;
      randomPosition();

      timer = setInterval(() => {
        timeLeft--;
        timerDisplay.textContent = timeLeft + 's';
        if (timeLeft <= 0) endGame();
      }, 1000);
    }

    function endGame() {
      clearInterval(timer);
      gameActive = false;
      startBtn.disabled = false;
      target.style.display = 'none';

      if (score > highscore) {
        highscore = score;
        localStorage.setItem('clickSpeedHighscore', highscore);
        highscoreDisplay.textContent = `New Highscore: ${highscore}!`;
        alert(`SYSTEM ALERT: New Record Established!\nScore: ${score}\nCPS: ${score/10}`);
      } else {
        alert(`TEST COMPLETE\nScore: ${score}\nCPS: ${score/10}`);
      }
    }

    target.addEventListener('click', () => {
      if (!gameActive) return;
      score++;
      scoreDisplay.textContent = score;
      randomPosition();
    });

    startBtn.addEventListener('click', startGame);

    // Initial state
    target.style.display = 'none';
  </script>

</style>

    <!-- Atmospheric Post-Processing Filters -->
    <svg style="display: none;">
        <filter id="noise">
            <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" />
            <feColorMatrix type="saturate" values="0" />
            <feComponentTransfer>
                <feFuncR type="linear" slope="0.1" />
                <feFuncG type="linear" slope="0.1" />
                <feFuncB type="linear" slope="0.1" />
            </feComponentTransfer>
        </filter>
    </svg>

<!-- Global Hub Navigation -->

    <script src="../hub-common.js"></script>
    <a href="../index.html" class="global-hub-btn">Back to Hub</a>
</body>
</html>
