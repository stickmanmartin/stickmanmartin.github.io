    :root {
        --bg-facility: #141418;
        --card-facility: rgba(20, 20, 24, 0.8);
        --accent-facility: #38bdf8;
        --text-main: #f8fafc;

    body {

        background-color: var(--bg-facility);
        color: var(--text-main);
        margin: 0;
        padding: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        overflow-x: hidden;
        cursor: none !important;
        perspective: 1000px;
    }

    /* Digital Vignette */
    body::before {
        content: '';
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: radial-gradient(circle at center, transparent 30%, rgba(0,0,0,0.5) 100%);
        pointer-events: none;
        z-index: 100;
    }

    /* Noise Overlay */
    body::after {
        content: '';

        top: 0; left: 0; width: 100%; height: 100%;
        filter: url(#noise);
        opacity: 0.15;
        pointer-events: none;
        z-index: 99;
    }

    #facility-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        pointer-events: none;
        transform: rotateX(15deg) scale(1.1);
        transform-origin: top;
    }

    
    
    
    @keyframes rotatePointer {
        0% { transform: rotate(0deg) scale(1); }
        50% { transform: rotate(180deg) scale(1.1); }
        100% { transform: rotate(360deg) scale(1); }
    }

    /* Hide cursor on all interactives */
    a, button, input, select, textarea, [role="button"], #target, .cell {
        cursor: none !important;
    }

<style>
    #neural-pointer {
        position: fixed;
        width: 32px;
        height: 32px;
        pointer-events: none;
        z-index: 9999999;
        transform: translate(0, 0);
        display: block;
        filter: 
            drop-shadow(0 0 10px var(--rainbow-glow, #38bdf8))
            drop-shadow(0 0 2px #fff) 
            drop-shadow(1px 0 0 #000) 
            drop-shadow(-1px 0 0 #000) 
            drop-shadow(0 1px 0 #000) 
            drop-shadow(0 -1px 0 #000);
    }
    #neural-pointer::before {
        content: '';
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        clip-path: polygon(0% 0%, 100% 70%, 40% 70%, 40% 100%);
        transition: background 0.3s ease;
    }
    
    #neural-pointer.day-mode::before { background: #ffffff; }
    #neural-pointer.night-mode::before { background: #000000; }

    *, html, body, a, button, input, select, textarea, canvas {
        cursor: none !important;
    }
</style>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Current Score</div>
        <div id="score" class="stat-value">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Time Remaining</div>
        <div id="timer" class="stat-value">10s</div>
      </div>
    </div>

    <button id="startBtn">Initialize Test</button>
    <div id="highscore-display">Highscore: 0</div>

    <div id="game">
      <div id="target">SYNC</div>
    </div>
  </main>

  <script src="facility_bg.js"></script>
  <script>
    const target = document.getElementById('target');
    const scoreDisplay = document.getElementById('score');
    const timerDisplay = document.getElementById('timer');
    const startBtn = document.getElementById('startBtn');
    const gameArea = document.getElementById('game');
    const highscoreDisplay = document.getElementById('highscore-display');

    let score = 0;
    let timeLeft = 10;
    let gameActive = false;
    let timer;

    // Load Highscore
    let highscore = localStorage.getItem('clickSpeedHighscore') || 0;
    highscoreDisplay.textContent = `Highscore: ${highscore}`;

    function randomPosition() {
      const maxX = gameArea.clientWidth - target.clientWidth;
      const maxY = gameArea.clientHeight - target.clientHeight;
      const x = Math.random() * maxX;
      const y = Math.random() * maxY;
      target.style.left = x + 'px';
      target.style.top = y + 'px';
      target.style.display = 'block';
    }

    function startGame() {
      if (gameActive) return;
      gameActive = true;
      score = 0;
      timeLeft = 10;
      scoreDisplay.textContent = '0';
      timerDisplay.textContent = '10s';
      startBtn.disabled = true;
      randomPosition();

      timer = setInterval(() => {
        timeLeft--;
        timerDisplay.textContent = timeLeft + 's';
        if (timeLeft <= 0) endGame();
      }, 1000);
    }

    function endGame() {
      clearInterval(timer);
      gameActive = false;
      startBtn.disabled = false;
      target.style.display = 'none';

      if (score > highscore) {
        highscore = score;
        localStorage.setItem('clickSpeedHighscore', highscore);
        highscoreDisplay.textContent = `New Highscore: ${highscore}!`;
        alert(`SYSTEM ALERT: New Record Established!\nScore: ${score}\nCPS: ${score/10}`);
      } else {
        alert(`TEST COMPLETE\nScore: ${score}\nCPS: ${score/10}`);
      }
    }

    target.addEventListener('click', () => {
      if (!gameActive) return;
      score++;
      scoreDisplay.textContent = score;
      randomPosition();
    });

    startBtn.addEventListener('click', startGame);

    // Initial state
    target.style.display = 'none';
  </script>

<div id="neural-pointer"></div>
<script>
    (function() {
        const pointer = document.getElementById('neural-pointer');
        if (!pointer) return;

        let hue = 0;

        function isDayTime() {
            const hour = new Date().getHours();
            return hour >= 6 && hour < 18;
        }

        function updatePointer() {
            const isDay = isDayTime();
            pointer.classList.toggle('day-mode', isDay);
            pointer.classList.toggle('night-mode', !isDay);

            hue = (hue + 2) % 360;
            // High lightness for daytime to prevent "dark" feel, standard for night
            const lightness = isDay ? 85 : 60; 
            pointer.style.setProperty('--rainbow-glow', `hsl(${hue}, 100%, ${lightness}%)`);
        }

        window.addEventListener('mousemove', (e) => {
            pointer.style.left = e.clientX + 'px';
            pointer.style.top = e.clientY + 'px';
        });

        function animate() {
            updatePointer();
            requestAnimationFrame(animate);
        }
        animate();
    })();
</script>
