<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reflex Analysis - Testing Facility</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0f172a;
      --card-bg: #1e293b;
      --accent: #38bdf8;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }

    body {
      font-family: 'Poppins', sans-serif;
      text-align: center;
      background-color: var(--bg-facility);
      color: var(--text-main);
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      overflow-x: hidden;
      cursor: none;
    }

    #facility-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        pointer-events: none;
    }

    #facility-pointer {
        position: fixed;
        width: 12px;
        height: 12px;
        background: #fff;
        border-radius: 50%;
        pointer-events: none;
        z-index: 10001;
        mix-blend-mode: screen;
        box-shadow: 
            0 0 10px #fff,
            0 0 20px #38bdf8,
            0 0 40px rgba(56, 189, 248, 0.5);
        transform: translate(-50%, -50%);
    }

    h1 {
      font-size: 3rem;
      font-weight: 800;
      background: linear-gradient(to right, #38bdf8, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }

    .subtitle {
      color: var(--text-muted);
      margin-bottom: 30px;
    }

    #game-container {
      max-width: 600px;
      margin: 0 auto;
      background: var(--card-bg);
      padding: 30px;
      border-radius: 20px;
      border: 1px solid #334155;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    #game {
      margin: 20px auto;
      width: 100%;
      height: 400px;
      border: 2px solid var(--accent);
      position: relative;
      overflow: hidden;
      background: rgba(0,0,0,0.3);
      border-radius: 12px;
      box-shadow: inset 0 0 20px rgba(56, 189, 248, 0.2);
    }

    #target {
      width: 70px;
      height: 70px;
      background: var(--accent);
      color: var(--bg-dark);
      font-weight: 800;
      line-height: 70px;
      text-align: center;
      border-radius: 50%;
      position: absolute;
      cursor: crosshair;
      user-select: none;
      transition: transform 0.1s;
      box-shadow: 0 0 20px var(--accent);
      z-index: 10;
    }

    #target:active { transform: scale(0.9); }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: rgba(0,0,0,0.2);
      padding: 15px;
      border-radius: 12px;
      border: 1px solid #334155;
    }

    .stat-label {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .stat-value {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--accent);
    }

    #startBtn {
      padding: 15px 40px;
      font-size: 1.2rem;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(135deg, #38bdf8 0%, #0077ff 100%);
      color: white;
      border: none;
      border-radius: 50px;
      box-shadow: 0 10px 20px rgba(0, 119, 255, 0.3);
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    #startBtn:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 30px rgba(0, 119, 255, 0.5);
    }

    #startBtn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    #highscore-display {
      margin-top: 20px;
      font-size: 1rem;
      color: #10b981;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <header>
    <h1>Reflex Analysis</h1>
    <p class="subtitle">Neural Response Synchronization Test</p>
  </header>

  <main id="game-container">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Current Score</div>
        <div id="score" class="stat-value">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Time Remaining</div>
        <div id="timer" class="stat-value">10s</div>
      </div>
    </div>

    <button id="startBtn">Initialize Test</button>
    <div id="highscore-display">Highscore: 0</div>

    <div id="game">
      <div id="target">SYNC</div>
    </div>
  </main>

  <script src="facility_bg.js"></script>
  <script>
    const target = document.getElementById('target');
    const scoreDisplay = document.getElementById('score');
    const timerDisplay = document.getElementById('timer');
    const startBtn = document.getElementById('startBtn');
    const gameArea = document.getElementById('game');
    const highscoreDisplay = document.getElementById('highscore-display');

    let score = 0;
    let timeLeft = 10;
    let gameActive = false;
    let timer;

    // Load Highscore
    let highscore = localStorage.getItem('clickSpeedHighscore') || 0;
    highscoreDisplay.textContent = `Highscore: ${highscore}`;

    function randomPosition() {
      const maxX = gameArea.clientWidth - target.clientWidth;
      const maxY = gameArea.clientHeight - target.clientHeight;
      const x = Math.random() * maxX;
      const y = Math.random() * maxY;
      target.style.left = x + 'px';
      target.style.top = y + 'px';
      target.style.display = 'block';
    }

    function startGame() {
      if (gameActive) return;
      gameActive = true;
      score = 0;
      timeLeft = 10;
      scoreDisplay.textContent = '0';
      timerDisplay.textContent = '10s';
      startBtn.disabled = true;
      randomPosition();

      timer = setInterval(() => {
        timeLeft--;
        timerDisplay.textContent = timeLeft + 's';
        if (timeLeft <= 0) endGame();
      }, 1000);
    }

    function endGame() {
      clearInterval(timer);
      gameActive = false;
      startBtn.disabled = false;
      target.style.display = 'none';

      if (score > highscore) {
        highscore = score;
        localStorage.setItem('clickSpeedHighscore', highscore);
        highscoreDisplay.textContent = `New Highscore: ${highscore}!`;
        alert(`SYSTEM ALERT: New Record Established!\nScore: ${score}\nCPS: ${score/10}`);
      } else {
        alert(`TEST COMPLETE\nScore: ${score}\nCPS: ${score/10}`);
      }
    }

    target.addEventListener('click', () => {
      if (!gameActive) return;
      score++;
      scoreDisplay.textContent = score;
      randomPosition();
    });

    startBtn.addEventListener('click', startGame);

    // Initial state
    target.style.display = 'none';
  </script>

<!-- Global Hub Navigation -->
<style>
    .global-hub-btn {
        position: fixed;
        bottom: 25px;
        right: 25px;
        background: linear-gradient(135deg, #00f2ff 0%, #0077ff 100%);
        color: white !important;
        text-decoration: none !important;
        padding: 14px 28px;
        border-radius: 50px;
        font-family: 'Poppins', 'Segoe UI', sans-serif;
        font-weight: 800;
        font-size: 13px;
        letter-spacing: 1.5px;
        box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
        z-index: 1000000;
        border: 2px solid rgba(255, 255, 255, 0.8);
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        display: flex;
        align-items: center;
        gap: 10px;
        text-transform: uppercase;
        cursor: pointer;
    }
    .global-hub-btn:hover {
        transform: scale(1.1) translateY(-5px);
        box-shadow: 0 15px 30px rgba(0, 242, 255, 0.6);
        background: linear-gradient(135deg, #0077ff 0%, #00f2ff 100%);
        border-color: #fff;
    }
    .global-hub-btn::before {
        content: '🏠';
        font-size: 18px;
    }
    
    .facility-nav {
        position: fixed;
        top: 25px;
        left: 25px;
        background: rgba(30, 41, 59, 0.8);
        padding: 10px 20px;
        border-radius: 12px;
        border: 1px solid #334155;
        backdrop-filter: blur(5px);
        z-index: 1000;
        display: flex;
        gap: 15px;
    }
    
    .facility-nav a {
        color: var(--text-muted);
        text-decoration: none;
        font-size: 0.9rem;
        font-weight: 600;
        transition: color 0.3s;
    }
    
    .facility-nav a:hover {
        color: var(--accent);
    }
</style>

<div class="facility-nav">
    <a href="tests.html">Facility Dashboard</a>
    <a href="memorytest.html">Memory Test</a>
</div>

<a href="../index.html" class="global-hub-btn">Back to Hub</a>
</body>
</html>
