<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Click the Button!</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f0f0f0;
      margin: 0;
      padding: 20px;
    }
    #Home {
    position: fixed; /* Fixes the button position relative to the viewport */
    bottom: 20px; /* Distance from the bottom edge of the viewport */
    right: 20px; /* Distance from the right edge of the viewport */
    width: 50px;
    height: 50px;
    border: 2px solid #000000;
    border-radius: 50%;
    background-color: rgb(255, 0, 0);
    display: flex;
    justify-content: center;
    align-items: center;
    text-decoration: none;
    color: #fff;
    font-size: 18px;
    z-index: 1000;
  }
    #game {
      margin: 50px auto;
      width: 400px;
      height: 400px;
      border: 3px solid #333;
      position: relative;
      overflow: hidden;
      background: #fff;
      border-radius: 10px;
    }
    #target {
      width: 60px;
      height: 60px;
      background: #e74c3c;
      color: white;
      font-weight: bold;
      line-height: 60px;
      text-align: center;
      border-radius: 50%;
      position: absolute;
      cursor: pointer;
      user-select: none;
      transition: all 0.2s;
    }
    #target:hover { background: #c0392b; }
    #score, #timer, #startBtn {
      font-size: 24px;
      margin: 10px;
    }
    button {
      padding: 10px 20px;
      font-size: 18px;
      cursor: pointer;
      background: #3498db;
      color: white;
      border: none;
      border-radius: 5px;
    }
    button:hover { background: #2980b9; }
  </style>
</head>
<body>
  <h1>Click the Moving Button!</h1>
  <p id="score">Score: 0</p>
  <p id="timer">Time: 10</p>
  <button id="startBtn">Start Game</button>

  <div id="game">
    <div id="target">CLICK!</div>
  </div>

  <script>
    const target = document.getElementById('target');
    const scoreDisplay = document.getElementById('score');
    const timerDisplay = document.getElementById('timer');
    const startBtn = document.getElementById('startBtn');
    const gameArea = document.getElementById('game');

    let score = 0;
    let timeLeft = 10;
    let gameActive = false;
    let timer;

    function randomPosition() {
      const maxX = gameArea.clientWidth - target.clientWidth;
      const maxY = gameArea.clientHeight - target.clientHeight;
      const x = Math.random() * maxX;
      const y = Math.random() * maxY;
      target.style.left = x + 'px';
      target.style.top = y + 'px';
    }

    function startGame() {
      if (gameActive) return;
      gameActive = true;
      score = 0;
      timeLeft = 10;
      scoreDisplay.textContent = 'Score: 0';
      timerDisplay.textContent = 'Time: 10';
      startBtn.disabled = true;
      randomPosition();

      timer = setInterval(() => {
        timeLeft--;
        timerDisplay.textContent = 'Time: ' + timeLeft;
        if (timeLeft <= 0) endGame();
      }, 1000);
    }

    function endGame() {
      clearInterval(timer);
      gameActive = false;
      startBtn.disabled = false;
      alert('Game Over! Your average click per second: ' + score/10 + ' seconds');
      target.style.left = '-100px'; // Hide button
    }

    target.addEventListener('click', () => {
      if (!gameActive) return;
      score++;
      scoreDisplay.textContent = 'Score: ' + score;
      randomPosition();
    });

    startBtn.addEventListener('click', startGame);

    // Initial hide
    target.style.left = '-100px';
  </script>
    <a id="Home" href="../../index.html">Home</a>
    <a id="tests" href="tests.html">Other Tests</a>
</body>
</html>
