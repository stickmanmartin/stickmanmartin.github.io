<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>🏰 Base Defense: Strategic Fortress</title>
  <link rel="stylesheet" href="basedefense.css">
</head>
<body>

  <h1>🏰 Base Defense: Strategic Fortress</h1>
  <canvas id="game" width="600" height="600"></canvas>

  <div class="hud" id="hud"></div>

  <div class="speed-controls" style="margin-top: 10px; display: flex; gap: 10px;">
    <button class="speed-btn active" onclick="setBaseSpeed(1)">1x</button>
    <button class="speed-btn" onclick="setBaseSpeed(2)">2x</button>
    <button class="speed-btn" onclick="setBaseSpeed(4)">4x</button>
  </div>

  <div class="choices" id="choices" style="display:none;"></div>
  <div class="shop" id="shop" style="display:none;"></div>
  <div class="level-up-options" id="levelUpOptions" style="display:none;"></div>

  <div id="gameMessage" class="message"></div>

  <div id="modalOverlay" class="modal-overlay">
      <div id="modalContent" class="modal-content"></div>
  </div>

  <script src="basedefense.js"></script>

<!-- Global Hub Navigation -->
<style>
    .global-hub-btn {
        position: fixed;
        bottom: 25px;
        right: 25px;
        background: linear-gradient(135deg, #00f2ff 0%, #0077ff 100%);
        color: white !important;
        text-decoration: none !important;
        padding: 14px 28px;
        border-radius: 50px;
        font-family: 'Poppins', 'Segoe UI', sans-serif;
        font-weight: 800;
        font-size: 13px;
        letter-spacing: 1.5px;
        box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
        z-index: 1000000;
        border: 2px solid rgba(255, 255, 255, 0.8);
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        display: flex;
        align-items: center;
        gap: 10px;
        text-transform: uppercase;
        cursor: pointer;
    }
    .global-hub-btn:hover {
        transform: scale(1.1) translateY(-5px);
        box-shadow: 0 15px 30px rgba(0, 242, 255, 0.6);
        background: linear-gradient(135deg, #0077ff 0%, #00f2ff 100%);
        border-color: #fff;
    }
    .global-hub-btn::before {
        content: '🏠';
        font-size: 18px;
    }
</style>

<a href="../index.html" class="global-hub-btn">Back to Hub</a>
</body>
</html>
