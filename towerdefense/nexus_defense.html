<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Defense: Tactical Overdrive</title>
    <link rel="stylesheet" href="nexus_defense.css">
</head>
<body>
    <div id="game-container">
        <header>
            <div class="stat-group">
                <div class="stat-box hp">❤️ <span id="base-hp">1500</span></div>
                <div class="stat-box gold">💰 <span id="gold">1200</span></div>
            </div>
            <div class="title-group">
                <h1>NEXUS DEFENSE</h1>
                <div id="wave-counter">WAVE: <span id="wave">0</span></div>
                <!-- Ultimate Meter -->
                <div id="ult-container">
                    <div id="ult-fill"></div>
                    <button id="ult-btn" onclick="triggerUltimate()">ACTIVATE ULTIMATE</button>
                </div>
            </div>
            <div class="stat-group">
                <div class="stat-box level">🎖️ LVL <span id="level">1</span></div>
                <div class="stat-box xp">✨ XP <span id="xp">0</span></div>
            </div>
        </header>

        <div id="canvas-wrapper">
            <canvas id="game-canvas" width="600" height="700"></canvas>

            <!-- Difficulty Selector -->
            <div id="difficulty-overlay" class="overlay">
                <div class="overlay-inner">
                    <h2>TACTICAL INITIALIZATION</h2>
                    <p>Select Deployment Difficulty:</p>
                    <div class="overlay-actions" style="flex-direction:column; gap:10px;">
                        <button class="main-btn" style="border-color:#00ff66; color:#00ff66;" onclick="setDifficulty('EASY')">RECRUIT (EASY)</button>
                        <button class="main-btn" style="border-color:#00f2ff; color:#00f2ff;" onclick="setDifficulty('NORMAL')">COMMANDER (NORMAL)</button>
                        <button class="main-btn" style="border-color:#ff0055; color:#ff0055;" onclick="setDifficulty('BRUTAL')">LEGEND (BRUTAL)</button>
                    </div>
                </div>
            </div>

            <!-- Choice Overlay -->
            <div id="choice-overlay" class="overlay" style="display: none;">
                <div class="overlay-inner">
                    <h2 id="overlay-title">WAVE CLEARED!</h2>
                    <p class="overlay-hint" style="color:#00ff66;">PICK ONE NEW TOWER (FREE REWARD)</p>
                    <div id="choices-container"></div>
                    <div class="divider"><span>OR</span></div>
                    <div class="overlay-actions">
                        <button class="main-btn gold-btn" onclick="showUpgradeMenu()">OPEN ARMORY & SHOP</button>
                        <button class="main-btn danger-btn" onclick="skipPlacement()">SKIP TO NEXT WAVE</button>
                    </div>
                </div>
            </div>

            <!-- Shop Overlay (Upgrades & Market) -->
            <div id="upgrade-overlay" class="overlay" style="display: none;">
                <div class="overlay-inner wide">
                    <div class="shop-header-row">
                        <h2>NEXUS ARMORY</h2>
                        <div class="shop-gold">💰 <span id="shop-gold-val">0</span></div>
                    </div>
                    <div class="shop-tabs">
                        <button id="tab-upgrades" class="tab-btn active" onclick="switchShopTab('upgrades')">UPGRADES</button>
                        <button id="tab-market" class="tab-btn" onclick="switchShopTab('market')">BUY TOWERS</button>
                    </div>
                    <div id="upgrade-list"></div>
                    <div id="market-list" style="display:none;"></div>
                    <div class="overlay-actions">
                        <button class="main-btn" onclick="closeUpgradeMenu()">RETURN TO REWARDS</button>
                    </div>
                </div>
            </div>
            
            <div id="placement-hint" class="floating-hint" style="display:none;">
                <div class="hint-pulse"></div>
                <span>SELECT SECTOR IN DEFENSE ZONE</span>
            </div>

            <div id="gameover-overlay" class="overlay" style="display: none;">
                <div class="overlay-inner">
                    <h1 class="critical-text">NEXUS BREACHED</h1>
                    <p id="final-stats"></p>
                    <button class="main-btn gold-btn" onclick="location.reload()">REBOOT SYSTEM</button>
                </div>
            </div>
        </div>

        <div id="ui-footer">
            <div id="combat-log"></div>
            <div class="speed-controls">
                <button class="speed-btn active" onclick="setSpeed(1)">1x</button>
                <button class="speed-btn" onclick="setSpeed(2)">2x</button>
                <button class="speed-btn" onclick="setSpeed(4)">4x</button>
            </div>
        </div>
    </div>

    <script src="nexus_defense.js"></script>
    









<!-- Global Hub Navigation -->
<style>
    .global-hub-btn {
        position: fixed;
        bottom: 25px;
        right: 25px;
        background: linear-gradient(135deg, #00f2ff 0%, #0077ff 100%);
        color: white !important;
        text-decoration: none !important;
        padding: 14px 28px;
        border-radius: 50px;
        font-family: 'Poppins', 'Segoe UI', sans-serif;
        font-weight: 800;
        font-size: 13px;
        letter-spacing: 1.5px;
        box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
        z-index: 1000000;
        border: 2px solid rgba(255, 255, 255, 0.8);
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        display: flex;
        align-items: center;
        gap: 10px;
        text-transform: uppercase;
        cursor: pointer;
    }
    .global-hub-btn:hover {
        transform: scale(1.1) translateY(-5px);
        box-shadow: 0 15px 30px rgba(0, 242, 255, 0.6);
        background: linear-gradient(135deg, #0077ff 0%, #00f2ff 100%);
        border-color: #fff;
    }
    .global-hub-btn::before {
        content: '🏠';
        font-size: 18px;
    }
</style>

<a href="../index.html" class="global-hub-btn">Back to Hub</a>
</body>
</html>
