<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometry Dash - Neon Red Edition</title>
    <link rel="stylesheet" href="gd.css">
</head>
<body>

    <div id="main-menu">
        <h1>Neon Red Dash</h1>
        <div class="difficulty-selector">
            <div class="diff-btn" id="easy" onclick="setDiff('easy')">EASY</div>
            <div class="diff-btn active" id="normal" onclick="setDiff('normal')">NORMAL</div>
            <div class="diff-btn" id="hard" onclick="setDiff('hard')">HARD</div>
        </div>
        <p style="color: #fff; opacity: 0.6; margin-bottom: 10px;">CHOOSE FOCUS MODE</p>
        <div class="menu-grid">
            <div class="menu-btn all" onclick="startGame('random')">Standard Mix</div>
            <div class="menu-btn" id="mode-cube" onclick="startGame('cube')">Cube</div>
            <div class="menu-btn" id="mode-ship" onclick="startGame('ship')">Ship</div>
            <div class="menu-btn" id="mode-ball" onclick="startGame('ball')">Ball</div>
            <div class="menu-btn" id="mode-ufo" onclick="startGame('ufo')">UFO</div>
            <div class="menu-btn" id="mode-wave" onclick="startGame('wave')">Wave</div>
            <div class="menu-btn" id="mode-robot" onclick="startGame('robot')">Robot</div>
            <div class="menu-btn" id="mode-spider" onclick="startGame('spider')">Spider</div>
            <div class="menu-btn" id="mode-swing" onclick="startGame('swing')">Swing</div>
        </div>
        <div class="menu-grid" style="margin-top: 10px;">
            <div class="menu-btn all" id="drone-btn" onclick="toggleDrone()">DRONE: OFF</div>
        </div>
    </div>

    <div class="hud" style="display: none;" id="game-hud">
        <div class="cps-counter">CPS: <span id="cps-value">0</span></div>
        <div class="progress-bar-container">
            <div id="progress-bar"></div>
        </div>
    </div>
    
    <a href="../index.html" class="global-hub-btn">Back to Hub</a>

    <div id="death-screen">
        <h1 style="font-size: 48px;">CRASHED</h1>
        <div class="death-btn-group">
            <div class="menu-btn" onclick="resetGame()" style="flex: 1;">Retry</div>
            <div class="menu-btn" onclick="location.reload()" style="flex: 1; border-color: #fff;">Menu</div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script src="gd.js"></script>
</body>
</html>
