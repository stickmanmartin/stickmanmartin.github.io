<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titan Warfare: Modular Evolution</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="tankwars.css">








<style>
    #neural-pointer {
        position: fixed;
        width: 32px;
        height: 32px;
        pointer-events: none;
        z-index: 9999999;
        transform: translate(0, 0);
        display: block;
        filter: 
            drop-shadow(0 0 10px var(--rainbow-glow, #38bdf8))
            drop-shadow(0 0 2px #fff) 
            drop-shadow(1px 0 0 #000) 
            drop-shadow(-1px 0 0 #000) 
            drop-shadow(0 1px 0 #000) 
            drop-shadow(0 -1px 0 #000);
    }
    #neural-pointer::before {
        content: '';
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        clip-path: polygon(0% 0%, 100% 70%, 40% 70%, 40% 100%);
        transition: background 0.3s ease;
    }
    
    #neural-pointer.day-mode::before { background: #ffffff; }
    #neural-pointer.night-mode::before { background: #000000; }

    *, html, body, a, button, input, select, textarea, canvas {
        cursor: none !important;
    }
</style>
</head>
<body>

    <div id="game-container">
        
        <div id="ui-panel">
            <h2 class="text-2xl font-bold mb-4 border-b pb-2 text-accent-color">Commander Status</h2>
            <div id="auth-status" class="text-xs mb-4 text-gray-400">Hub Storage Mode</div>

            <p class="text-xl font-semibold mb-2">Tank: <span id="tank-type" class="text-yellow-400">Basic</span></p>
            <p class="text-xl font-semibold mb-2">Level: <span id="player-level">1</span></p>
            
            <div class="w-full h-2 bg-gray-600 rounded-lg mb-1 overflow-hidden" title="Experience">
                <div id="exp-bar" class="h-full bg-purple-500 transition-all" style="width: 0%;"></div>
            </div>
            
            <p class="text-sm mb-4">EXP: <span id="player-exp">0</span> / <span id="exp-to-next">100</span></p>

            <h3 class="text-lg font-semibold mt-4 mb-2">Skill Points: <span id="skill-points" class="text-yellow-400">0</span></h3>

            <div id="stat-upgrades" class="space-y-2">
                <!-- Stat Upgrade Buttons injected by JS -->
            </div>
            
            <div class="mt-8 pt-4 border-t border-gray-600 space-y-3">
                <button id="fire-button" class="w-full bg-green-500 hover:bg-green-600 text-gray-900 py-2 rounded-lg text-sm font-bold">
                    FIRE (Spacebar/Click)
                </button>
                <button id="save-game-button" class="w-full bg-blue-500 hover:bg-blue-600 text-white py-2 rounded-lg text-sm">
                    Save Progress
                </button>
                <button id="load-game-button" class="w-full bg-yellow-500 hover:bg-yellow-600 text-gray-900 py-2 rounded-lg text-sm">
                    Load Last Save
                </button>
            </div>
        </div>

        <div id="canvas-container">
            <div id="hp-bar-container" class="hp-bar-container">
                <div id="hp-bar" class="hp-bar" style="width: 100%;">100 / 100</div>
            </div>
            <div id="game-messages"></div>
        </div>
    </div>
    
    <div id="upgrade-modal" class="hidden fixed inset-0 bg-black bg-opacity-80 z-50 flex items-center justify-center backdrop-blur-sm">
        <div class="bg-gray-900 p-8 rounded-xl shadow-2xl w-11/12 max-w-2xl border-4 border-green-500">
            <h3 class="text-3xl font-bold mb-4 text-center text-yellow-400">Tank Evolution Available!</h3>
            <p class="text-center mb-6 text-lg text-white">Choose your permanent upgrade path (Level 10):</p>
            <div id="upgrade-choices" class="grid grid-cols-2 gap-4 max-h-80 overflow-y-auto pr-2">
                <!-- Upgrade buttons injected by JS -->
            </div>
            <button id="skip-upgrade-button" class="w-full bg-gray-600 hover:bg-gray-700 text-white py-3 mt-6 rounded-lg font-semibold">
                Remain Basic (Skip for now)
            </button>
        </div>
    </div>

    <script type="module" src="tankwars.js"></script>

    


















<div id="neural-pointer"></div>
<script>
    (function() {
        const pointer = document.getElementById('neural-pointer');
        if (!pointer) return;

        let hue = 0;

        function isDayTime() {
            const hour = new Date().getHours();
            return hour >= 6 && hour < 18;
        }

        function updatePointer() {
            const isDay = isDayTime();
            pointer.classList.toggle('day-mode', isDay);
            pointer.classList.toggle('night-mode', !isDay);

            hue = (hue + 2) % 360;
            // High lightness for daytime to prevent "dark" feel, standard for night
            const lightness = isDay ? 85 : 60; 
            pointer.style.setProperty('--rainbow-glow', `hsl(${hue}, 100%, ${lightness}%)`);
        }

        window.addEventListener('mousemove', (e) => {
            pointer.style.left = e.clientX + 'px';
            pointer.style.top = e.clientY + 'px';
        });

        function animate() {
            updatePointer();
            requestAnimationFrame(animate);
        }
        animate();
    })();
</script>





























<!-- Global Hub Navigation -->
<style>
    .global-hub-btn {
        position: fixed;
        bottom: 25px;
        right: 25px;
        background: linear-gradient(135deg, #00b4d8 0%, #000033 100%);
        color: white !important;

        z-index: 1000000;
        border: 2px solid rgba(255, 255, 255, 0.6);
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        display: flex;
        align-items: center;
        text-transform: uppercase;
        cursor: pointer;
    }
    .global-hub-btn:hover {
        transform: scale(1.08) translateY(-5px);
        box-shadow: 0 12px 25px rgba(0, 180, 216, 0.5);
        background: linear-gradient(135deg, #00d4ff 0%, #00b4d8 100%);
        border-color: #fff;
    }
</style>

<a href="../index.html" class="global-hub-btn">Back to Hub</a>
</body>
</html>
