<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Face v2.0 - Interactive Simulation</title>
    <style>
        :root {
            --bg-color: #1a1a20;
            --face-skin: #FFE5B4;
            --eye-bg: #ffffff;
            --accent: #38bdf8;
            --heat-color: rgba(255, 0, 0, 0);
        }

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg-color);
            position: relative;
            overflow: hidden;
            cursor: none;
        }

        /* Ambient Neural Background */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 50% 50%, rgba(56, 189, 248, 0.05) 0%, transparent 70%),
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 100% 100%, 50px 50px, 50px 50px;
            z-index: -1;
        }

        .container {
            position: relative;
            width: 500px;
            height: 600px;
            background: var(--face-skin);
            border-radius: 150px 150px 100px 100px;
            box-shadow: 
                0 20px 50px rgba(0,0,0,0.5),
                inset 0 -20px 40px rgba(0,0,0,0.1);
            transition: background-color 0.5s;
        }

        /* Flushing effect when eating */
        .container.flushing {
            background-color: #ffb38a;
        }

        /* --- EYES --- */
        .eyes {
            position: absolute;
            top: 120px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            padding: 0 40px;
            box-sizing: border-box;
        }

        .eye-socket {
            width: 120px;
            height: 120px;
            background: var(--eye-bg);
            border: 6px solid #2d2d35;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 5px 15px rgba(0,0,0,0.2);
        }

        .pupil {
            width: 40px;
            height: 40px;
            background: #1a1a20;
            border-radius: 50%;
            position: absolute;
            transition: transform 0.1s ease-out;
        }

        .pupil::after {
            content: '';
            position: absolute;
            top: 8px; left: 8px;
            width: 12px; height: 12px;
            background: white;
            border-radius: 50%;
            opacity: 0.8;
        }

        .eyelid {
            position: absolute;
            top: -100%;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--face-skin);
            z-index: 10;
            border-bottom: 4px solid #2d2d35;
            animation: blinkAction 5s infinite;
        }

        @keyframes blinkAction {
            0%, 96%, 100% { top: -100%; }
            98% { top: 0%; }
        }

        /* --- NOSE --- */
        .nose {
            position: absolute;
            top: 280px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 100px;
            background: rgba(0,0,0,0.05);
            border-radius: 40px;
            z-index: 20;
        }

        .nostrils {
            position: absolute;
            bottom: 10px;
            width: 100%;
            display: flex;
            justify-content: space-around;
        }

        .nostril {
            width: 20px;
            height: 15px;
            background: #333;
            border-radius: 50%;
        }

        /* --- SMOKE --- */
        .smoke-emitter {
            position: absolute;
            top: -20px;
            width: 100%;
            pointer-events: none;
        }

        .smoke-particle {
            position: absolute;
            background: rgba(200, 200, 200, 0.6);
            border-radius: 50%;
            filter: blur(8px);
            opacity: 0;
            animation: riseAndFade 2s infinite ease-out;
        }

        @keyframes riseAndFade {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            20% { opacity: 0.5; }
            100% { transform: translateY(-150px) scale(5); opacity: 0; }
        }

        /* --- MOUTH --- */
        .mouth-container {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .mouth {
            width: 100%;
            height: 20px;
            background: #8b1a1a;
            border: 6px solid #2d2d35;
            border-radius: 100px;
            position: relative;
            overflow: hidden;
            transition: height 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .mouth.open {
            height: 140px;
        }

        .teeth-row {
            display: flex;
            justify-content: space-around;
            width: 100%;
            padding: 2px 10px;
        }

        .tooth {
            width: 25px;
            height: 30px;
            background: white;
            border-radius: 0 0 8px 8px;
            border: 1px solid #ddd;
        }

        .teeth-row.bottom .tooth {
            border-radius: 8px 8px 0 0;
        }

        /* --- FOOD --- */
        .chicken-leg {
            position: absolute;
            width: 120px;
            height: 120px;
            pointer-events: none;
            z-index: 100;
            display: none;
            transform-origin: center;
        }

        /* --- UI ELEMENTS --- */
        .metabolism-meter {
            position: absolute;
            right: -100px;
            top: 50px;
            width: 20px;
            height: 400px;
            background: #2d2d35;
            border-radius: 10px;
            border: 2px solid var(--accent);
            overflow: hidden;
        }

        .meter-fill {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 0%;
            background: linear-gradient(to top, #10b981, #fbbf24, #ef4444);
            transition: height 0.5s;
        }

        

        

        @keyframes rotatePointer {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .global-hub-btn {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: linear-gradient(135deg, #00f2ff 0%, #0077ff 100%);
            color: white;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 50px;
            font-weight: 800;
            z-index: 10000;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
            border: 2px solid white;
        }
    </style>




<style>
    #neural-pointer {
        position: fixed;
        width: 32px;
        height: 32px;
        pointer-events: none;
        z-index: 9999999;
        transform: translate(0, 0);
        display: block;
        /* Apply shadow to the parent so it doesn't get clipped */
        filter: 
            drop-shadow(2px 0 0 #000) 
            drop-shadow(-2px 0 0 #000) 
            drop-shadow(0 2px 0 #000) 
            drop-shadow(0 -2px 0 #000)
            drop-shadow(1px 1px 0 #000)
            drop-shadow(-1px -1px 0 #000);
    }
    #neural-pointer::before {
        content: '';
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        clip-path: polygon(0% 0%, 100% 70%, 40% 70%, 40% 100%);
        transition: background 0.3s ease;
    }
    
    /* Day Mode: Glowing White (with Black Outline from parent) */
    #neural-pointer.day-mode::before {
        background: #ffffff;
    }
    
    /* Night Mode: Black (with White inner glow then Black Outline from parent) */
    #neural-pointer.night-mode::before {
        background: #000000;
        /* Add a small white inner glow to distinguish from the black background */
        box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.8); /* Border inside clip-path helps */
    }

    /* Hide original cursor project-wide */
    *, html, body, a, button, input, select, textarea, canvas {
        cursor: none !important;
    }
</style>
</head>
<body>

    <div class="container" id="face">
        <div class="metabolism-meter">
            <div class="meter-fill" id="meter"></div>
        </div>

        <div class="eyes">
            <div class="eye-socket">
                <div class="eyelid"></div>
                <div class="pupil" id="pupil-l"></div>
            </div>
            <div class="eye-socket">
                <div class="eyelid"></div>
                <div class="pupil" id="pupil-r"></div>
            </div>
        </div>

        <div class="nose">
            <div class="nostrils">
                <div class="nostril"></div>
                <div class="nostril"></div>
            </div>
            <div class="smoke-emitter" id="smoke-l" style="left: 10px;"></div>
            <div class="smoke-emitter" id="smoke-r" style="right: 10px;"></div>
        </div>

        <div class="mouth-container">
            <div class="mouth" id="mouth">
                <div class="teeth-row">
                    <div class="tooth"></div>
                    <div class="tooth"></div>
                    <div class="tooth"></div>
                    <div class="tooth"></div>
                </div>
                <div class="teeth-row bottom">
                    <div class="tooth"></div>
                    <div class="tooth"></div>
                    <div class="tooth"></div>
                    <div class="tooth"></div>
                </div>
            </div>
        </div>
    </div>

    <img src="https://img.icons8.com/color/512/poultry-leg.png" class="chicken-leg" id="chicken">

    

    <a href="index.html" class="global-hub-btn">Back to the Hub</a>

    <script>
        function isDayTime() {
            const hour = new Date().getHours();
            return hour >= 6 && hour < 18;
        }

        const face = document.getElementById('face');
        const mouth = document.getElementById('mouth');
        const chicken = document.getElementById('chicken');
        const meter = document.getElementById('meter');
        const pupilL = document.getElementById('pupil-l');
        const pupilR = document.getElementById('pupil-r');
        const pointer = document.getElementById('facility-pointer');
        
        let metabolism = 0;
        let isEating = false;

        // Apply initial circadian colors
        const isDay = isDayTime();
        document.body.style.backgroundColor = isDay ? '#f0f0f0' : '#0a0a0c';
        face.style.backgroundColor = isDay ? '#FFE5B4' : '#d2b48c';

        window.addEventListener('mousemove', (e) => {
            pointer.style.left = e.clientX + 'px';
            pointer.style.top = e.clientY + 'px';

            // Eye Tracking
            const movePupil = (pupil) => {
                const rect = pupil.parentElement.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                const dx = e.clientX - centerX;
                const dy = e.clientY - centerY;
                const dist = Math.sqrt(dx*dx + dy*dy);
                const maxMove = 30;
                const angle = Math.atan2(dy, dx);
                const moveX = Math.cos(angle) * Math.min(dist/10, maxMove);
                const moveY = Math.sin(angle) * Math.min(dist/10, maxMove);
                pupil.style.transform = `translate(${moveX}px, ${moveY}px)`;
            };
            movePupil(pupilL);
            movePupil(pupilR);

            // Trigger Eating Interaction
            const mouthRect = mouth.getBoundingClientRect();
            const distToMouth = Math.sqrt(
                Math.pow(e.clientX - (mouthRect.left + mouthRect.width/2), 2) +
                Math.pow(e.clientY - (mouthRect.top + mouthRect.height/2), 2)
            );

            if (distToMouth < 100 && !isEating) {
                startEating(e.clientX, e.clientY);
            }
        });

        function startEating(x, y) {
            isEating = true;
            mouth.classList.add('open');
            chicken.style.display = 'block';
            chicken.style.left = (x - 60) + 'px';
            chicken.style.top = (y - 60) + 'px';
            
            // Animation for chicken being "eaten"
            let progress = 0;
            const eatInterval = setInterval(() => {
                progress += 0.05;
                const mouthRect = mouth.getBoundingClientRect();
                const targetX = mouthRect.left + mouthRect.width/2 - 60;
                const targetY = mouthRect.top + mouthRect.height/2 - 60;
                
                const curX = parseFloat(chicken.style.left);
                const curY = parseFloat(chicken.style.top);
                
                chicken.style.left = (curX + (targetX - curX) * 0.2) + 'px';
                chicken.style.top = (curY + (targetY - curY) * 0.2) + 'px';
                chicken.style.transform = `scale(${1 - progress}) rotate(${progress * 360}deg)`;

                if (progress >= 1) {
                    clearInterval(eatInterval);
                    finishEating();
                }
            }, 30);
        }

        function finishEating() {
            chicken.style.display = 'none';
            mouth.classList.remove('open');
            
            metabolism = Math.min(100, metabolism + 15);
            updateMetabolism();
            
            // Generate Smoke based on metabolism
            for(let i=0; i<Math.floor(metabolism/20); i++) {
                createSmoke('smoke-l');
                createSmoke('smoke-r');
            }

            setTimeout(() => { isEating = false; }, 500);
        }

        function updateMetabolism() {
            const isDay = isDayTime();
            meter.style.height = metabolism + '%';
            if (metabolism > 50) {
                face.classList.add('flushing');
                face.style.backgroundColor = isDay ? '#ffcccc' : '#c58e7f';
            } else {
                face.classList.remove('flushing');
                face.style.backgroundColor = isDay ? '#FFE5B4' : '#d2b48c';
            }
        }

        function createSmoke(id) {
            const container = document.getElementById(id);
            const p = document.createElement('div');
            p.className = 'smoke-particle';
            const size = 10 + Math.random() * 20;
            p.style.width = size + 'px';
            p.style.height = size + 'px';
            p.style.left = (Math.random() * 20 - 10) + 'px';
            container.appendChild(p);
            setTimeout(() => p.remove(), 2000);
        }

        // Metabolism decay
        setInterval(() => {
            if (metabolism > 0) {
                metabolism -= 0.5;
                updateMetabolism();
                if (Math.random() < metabolism/200) {
                    createSmoke('smoke-l');
                    createSmoke('smoke-r');
                }
            }
        }, 100);

    </script>








<div id="neural-pointer"></div>
<script>
    (function() {
        const pointer = document.getElementById('neural-pointer');
        if (!pointer) return;

        function isDayTime() {
            const hour = new Date().getHours();
            return hour >= 6 && hour < 18;
        }

        function updatePointerMode() {
            const isDay = isDayTime();
            pointer.classList.toggle('day-mode', isDay);
            pointer.classList.toggle('night-mode', !isDay);
        }

        window.addEventListener('mousemove', (e) => {
            pointer.style.left = e.clientX + 'px';
            pointer.style.top = e.clientY + 'px';
        });

        updatePointerMode();
        setInterval(updatePointerMode, 60000);
    })();
</script>
</body>
</html>
