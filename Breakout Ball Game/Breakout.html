<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shatter Code</title>
    <link rel="stylesheet" href="breakout.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0a0a0c;
            font-family: 'Poppins', sans-serif;
        }
        canvas {
            display: block;
        }
        h1 {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.1);
            font-size: 5rem;
            margin: 0;
            pointer-events: none;
            text-transform: uppercase;
            letter-spacing: 10px;
            white-space: nowrap;
        }
        #ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #38bdf8;
            font-weight: 700;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        #game-over {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 10, 12, 0.9);
            border: 2px solid #38bdf8;
            padding: 40px;
            border-radius: 8px;
            text-align: center;
            z-index: 100;
            box-shadow: 0 0 50px rgba(56, 189, 248, 0.3);
        }
        #game-over h2 {
            color: #ef4444;
            font-size: 3rem;
            margin: 0 0 20px 0;
        }
        #game-over p {
            color: #f8fafc;
            margin: 0 0 30px 0;
        }
        #game-over button {
            background: #38bdf8;
            color: #0a0a0c;
            border: none;
            padding: 12px 30px;
            font-weight: 800;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s;
        }
        #game-over button:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.5);
        }
    </style>

    <link rel="stylesheet" href="../hub-common.css">
</head>
<body>
    <div id="progression-title">
        <span class="letter">B</span>
        <span class="letter">R</span>
        <span class="letter">E</span>
        <span class="letter">A</span>
        <span class="letter">K</span>
        <span class="letter">O</span>
        <span class="letter">U</span>
        <span class="letter">T</span>
    </div>
    <style>
        #progression-title {
            position: absolute;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 10;
            pointer-events: none;
        }
        .letter {
            font-size: 5rem;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.05);
            text-transform: uppercase;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-shadow: none;
        }
        .letter.active {
            color: #38bdf8;
            text-shadow: 0 0 20px #38bdf8, 0 0 40px rgba(56, 189, 248, 0.5);
            transform: scale(1.2);
        }
    </style>
    <div id="ui-overlay">
        Score: <span id="score">0</span> | Lives: <span id="lives">3</span> | Speed: <span id="speed">1.0</span>x
    </div>
    
    <div id="game-over">
        <h2>TERMINATED</h2>
        <p>Neural Link Severed. Final Score: <span id="final-score">0</span></p>
        <button onclick="resetGame()">Re-Initialize</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script src="breakout.js"></script>

<!-- Global Hub Navigation -->

    <script src="../hub-common.js"></script>
    <a href="../index.html" class="global-hub-btn theme-action">Back to Hub</a>
</body>

</html>
