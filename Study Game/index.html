  const [playMode, setPlayMode] = useState('normal'); // 'normal' (fast upgrades) or 'study' (original questions)
  const playModeRef = useRef('normal');
  const [godPicks, setGodPicks] = useState(0);
  const handleModeChange = (mode) => {
      setPlayMode(mode);
      playModeRef.current = mode;
  };

  // --- GAME ENGINE STATE (Stored in Refs for performance) ---
  const engine = useRef({
    isActive: false,
    width: 800,
    height: 600,
    keys: {},
    frameCount: 0,
    
    // Core stats
    score: 0,
    energy: 0,
    maxEnergy: 50,
    level: 1,
    enemiesToNextLevel: 10,
    kills: 0,
    
    // Entities
    player: { x: 400, y: 500, w: 30, h: 40, speed: 5, hp: 5, maxHp: 5, shootCooldown: 0, baseFireRate: 15 },
    bullets: [],
    enemyBullets: [],
    enemies: [],
    particles: [],
    
    // 21 Powerups - Stores STACK COUNTS instead of booleans
    powerups: { 
        damage: 0, rapid: 0, speed: 0, hull: 0, poison: 0, autoAim: 0,
        bulletSize: 0, bulletSpeed: 0, spread: 0, backShot: 0, sideShot: 0, 
        energyGain: 0, shrink: 0, regen: 0, slowEnemies: 0, weakEnemies: 0, 
        slowEnemyBullets: 0, scoreMulti: 0, diagonal: 0, pacify: 0, leech: 0 
    },
    
    // Question queue for tracking shuffled questions
    questionQueue: [],

    // Starfield background
    stars: Array.from({length: 100}).map(() => ({
        x: Math.random() * 800, 
        y: Math.random() * 600, 
        size: Math.random() * 2 + 1, 
        speed: Math.random() * 2 + 0.5
    }))
  });

  const syncUI = useCallback(() => {
    setUiStats({
      hp: engine.current.player.hp,
      maxHp: engine.current.player.maxHp,
      score: Math.floor(engine.current.score),
      energy: engine.current.energy,
      maxEnergy: engine.current.maxEnergy,
      level: engine.current.level,
      kills: engine.current.kills
    });
  }, []);

  const createParticle = (x, y, color, count = 5) => {
    for(let i=0; i<count; i++) {
      engine.current.particles.push({
        x, y, 
        vx: (Math.random() - 0.5) * 8, 
        vy: (Math.random() - 0.5) * 8, 
        life: 1.0, 
        color,
        size: Math.random() * 4 + 2
      });
    }
  };

  const generateGodPowerups = useCallback(() => {
      let pool = [...AVAILABLE_POWERUPS];
      let picked = [];
      for (let i = 0; i < 10; i++) {
          if (pool.length === 0) break;
          let randIdx = Math.floor(Math.random() * pool.length);
          picked.push(pool[randIdx]);
          pool.splice(randIdx, 1);
      }
      setOfferedPowerUps(picked);
  }, []);

  const triggerGodModeUpgrades = useCallback(() => {
      engine.current.isActive = false;
      setGodPicks(5);
      generateGodPowerups();
      setGameState('powerup-select');
  }, [generateGodPowerups]);

  const loadNextQuestion = useCallback(() => {
    if (engine.current.questionQueue.length === 0) {
      engine.current.questionQueue = [...allQuestions].sort(() => 0.5 - Math.random());
    }

    const q = engine.current.questionQueue.pop();
    setCurrentQuestion(q);
    setSelectedAnswer(null);
    setGameState('question');
  }, []);

  const triggerQuestionPhase = useCallback(() => {
    engine.current.isActive = false; 
    engine.current.energy = 0; 
    
    // Scaling Difficulty: Max Energy required goes up slightly each time
    engine.current.maxEnergy += 5;
    syncUI(); 
    
    // Determine how many questions are needed based on current upgrade count
    const totalUpgrades = activePowerUps.reduce((sum, p) => sum + p.count, 0);
    // Harder Scaling: Start at needing 2, up by 1 every 3 upgrades (Starts prompting after 15 stacks)
    const needed = Math.floor(totalUpgrades / 3) + 2;
    setQuestionsNeeded(needed);
    setQuestionsAnswered(0);

    loadNextQuestion();
  }, [activePowerUps, syncUI, loadNextQuestion]);

  // --- STABLE AND NON-RECREATED GAME LOOP (Fixes duplicate loops, freezing inputs, and bullet storms) ---
  const gameLoop = useCallback(() => {
    if (!engine.current.isActive) return;
    
    const state = engine.current;
    state.frameCount++;
    const ctx = canvasRef.current?.getContext('2d');
    if (!ctx) {
        return;
    }

    // 1. UPDATE PHYSICS & LOGIC
    
    // --- PLAYER MOVEMENT (Stacked Speed & Shrink) ---
    const currentSpeed = state.player.speed + (state.powerups.speed * 0.2);
    let scale = Math.max(0.3, 1 - (state.powerups.shrink * 0.01));
    state.player.w = 30 * scale;
    state.player.h = 40 * scale;
    
    // Support lowercase and original arrow-key tracking
    if (state.keys['arrowleft'] || state.keys['a']) state.player.x -= currentSpeed;
    if (state.keys['arrowright'] || state.keys['d']) state.player.x += currentSpeed;
    if (state.keys['arrowup'] || state.keys['w']) state.player.y -= currentSpeed;
    if (state.keys['arrowdown'] || state.keys['s']) state.player.y += currentSpeed;
    
    state.player.x = Math.max(state.player.w/2, Math.min(state.width - state.player.w/2, state.player.x));
    state.player.y = Math.max(state.player.h/2, Math.min(state.height - state.player.h/2, state.player.y));

    // --- REGEN POWERUP ---
    if (state.powerups.regen > 0) {
        let regenFrames = Math.max(60, 600 - (state.powerups.regen * 15));
        if (state.frameCount % regenFrames === 0) {
            state.player.hp = Math.min(state.player.maxHp, state.player.hp + 1);
        }
    }

    // --- PLAYER SHOOTING (Stacked Upgrades) ---
    if (state.player.shootCooldown > 0) state.player.shootCooldown--;
    if (state.player.shootCooldown <= 0) {
      const fireRate = Math.max(2, state.player.baseFireRate - (state.powerups.rapid * 0.5));
      state.player.shootCooldown = fireRate;
      
      const dmg = 1 + (state.powerups.damage * 0.1);
      const bSize = 4 + (state.powerups.bulletSize * 0.5);
      const baseVy = -12 - (state.powerups.bulletSpeed * 0.5);
      
      // Main Spread
      let numBullets = 1 + state.powerups.spread;
      for(let i=0; i<numBullets; i++) {
         let offset = (i - (numBullets-1)/2); 
         let vx = offset * 2.5; 
         let vy = baseVy + Math.abs(offset) * 0.3; 
         state.bullets.push({ x: state.player.x, y: state.player.y - 20, vx, vy, w: bSize, h: 15, dmg, life: 100 }); // Cap lifetime to prevent lag
      }

      // Diagonal Shots
      if (state.powerups.diagonal > 0) {
          let diagSpeed = 8 + (state.powerups.bulletSpeed * 0.5);
          for(let i=0; i<state.powerups.diagonal; i++) {
              state.bullets.push({ x: state.player.x, y: state.player.y, vx: diagSpeed, vy: -diagSpeed, w: bSize, h: 15, dmg, life: 100 });
              state.bullets.push({ x: state.player.x, y: state.player.y, vx: -diagSpeed, vy: -diagSpeed, w: bSize, h: 15, dmg, life: 100 });
          }
      }

      // Back Shots
      if (state.powerups.backShot > 0) {
          for(let i=0; i<state.powerups.backShot; i++) {
              let offset = (i - (state.powerups.backShot-1)/2) * 2;
              state.bullets.push({ x: state.player.x, y: state.player.y + 20, vx: offset, vy: Math.abs(baseVy), w: bSize, h: 15, dmg, life: 100 });
          }
      }

      // Side Shots
      if (state.powerups.sideShot > 0) {
          for(let i=0; i<state.powerups.sideShot; i++) {
              let offset = (i - (state.powerups.sideShot-1)/2) * 2;
              let speed = Math.abs(baseVy);
              state.bullets.push({ x: state.player.x + 20, y: state.player.y, vx: speed, vy: offset, w: 15, h: bSize, dmg, life: 100 });
              state.bullets.push({ x: state.player.x - 20, y: state.player.y, vx: -speed, vy: offset, w: 15, h: bSize, dmg, life: 100 });
          }
      }
    }

    // --- BULLETS LOOP (With Forward-Only seeking Auto-Aim) ---
    state.bullets.forEach(b => { 
        b.life--; // Keep tracking bullet decay
        
        if (state.powerups.autoAim > 0) {
            // Locate closest enemy on screen
            let nearest = null;
            let minDist = Infinity;
            state.enemies.forEach(e => {
                let dist = Math.hypot(e.x - b.x, e.y - b.y);
                if (dist < minDist) {
                    minDist = dist;
                    nearest = e;
                }
            });
            
            // Fix: Bullets will only home on targets directly in front of them (above).
            // This prevents lasers from doing 180s and orbiting endlessly around enemies.
            if (nearest && nearest.y < b.y) {
                let angle = Math.atan2(nearest.y - b.y, nearest.x - b.x);
                let currentSpeed = Math.hypot(b.vx, b.vy);
                let targetVx = Math.cos(angle) * currentSpeed;
                let targetVy = Math.sin(angle) * currentSpeed;
                
                let steerRate = Math.min(0.25, 0.05 * state.powerups.autoAim);
                b.vx += (targetVx - b.vx) * steerRate;
                b.vy += (targetVy - b.vy) * steerRate;
            }
        }
        b.x += b.vx; 
        b.y += b.vy; 
    });
    // Filter off-screen and expired bullets
    state.bullets = state.bullets.filter(b => b.life > 0 && b.y > -20 && b.y < state.height + 20 && b.x > -20 && b.x < state.width + 20);

    state.enemyBullets.forEach(b => { b.x += b.vx; b.y += b.vy; });
    state.enemyBullets = state.enemyBullets.filter(b => b.y < state.height + 20);

    // --- SPAWN ENEMIES ---
    let baseSpawnRate = Math.max(15, 70 - (state.level * 3));
    let finalSpawnRate = baseSpawnRate + (state.powerups.pacify * 1);

    if (state.frameCount % finalSpawnRate === 0) {
      const type = Math.random() > 0.8 ? 'tank' : 'scout';
      
      let rawMaxHp = type === 'tank' ? 3 + Math.floor(state.level * 0.8) : 1 + Math.floor(state.level * 0.3);
      let maxHp = Math.max(1, rawMaxHp - (state.powerups.weakEnemies * 0.2));
      
      let baseVy = type === 'tank' ? 1 + Math.random() : 2 + Math.random() + (state.level * 0.2);

      state.enemies.push({
        x: Math.random() * (state.width - 40) + 20,
        y: -40,
        w: type === 'tank' ? 40 : 25,
        h: type === 'tank' ? 40 : 25,
        baseVy: baseVy,
        hp: maxHp,
        maxHp: maxHp,
        type: type,
        shootCooldown: Math.max(20, Math.random() * 80 + 80 - (state.level * 3)), 
        poisoned: false
      });
    }

    // --- MOVE & UPDATE ENEMIES ---
    for (let j = state.enemies.length - 1; j >= 0; j--) {
        let e = state.enemies[j];
        
        // Slow enemies down based on powerup
        e.y += Math.max(0.5, e.baseVy - (state.powerups.slowEnemies * 0.05));
        
        e.shootCooldown--;
        if (e.shootCooldown <= 0 && e.y > 0 && e.y < state.height - 100) {
            let rawBulletVy = 5 + (state.level * 0.2);
            let bulletVy = Math.max(2, rawBulletVy - (state.powerups.slowEnemyBullets * 0.2));
            state.enemyBullets.push({ x: e.x, y: e.y + e.h/2, vx: 0, vy: bulletVy, w: 4, h: 12, dmg: 1 });
            e.shootCooldown = Math.max(20, Math.random() * 80 + 80 - (state.level * 3)); 
        }

        // Stacked Poison
        if (e.poisoned && state.powerups.poison > 0) {
            e.hp -= 0.02 * state.powerups.poison; 
            if (state.frameCount % 5 === 0) createParticle(e.x, e.y, '#84cc16', 1); 
        }

        if (e.hp <= 0) {
            createParticle(e.x, e.y, e.type === 'tank' ? '#ef4444' : '#a855f7', 15);
            state.score += (e.maxHp * 10) * (1 + state.powerups.scoreMulti * 0.05);
            state.kills++;
            
            // Leech chance
            if (Math.random() < state.powerups.leech * 0.01) {
                state.player.hp = Math.min(state.player.maxHp, state.player.hp + 1);
            }

            state.enemiesToNextLevel--;
            if (state.enemiesToNextLevel <= 0) {
                state.level++;
                state.enemiesToNextLevel = 10 * state.level;
            }

            if (playModeRef.current === 'normal') {
                state.enemies.splice(j, 1);
                triggerGodModeUpgrades();
                return;
            } else {
                // AUTO-COLLECT ENERGY
                state.energy += 35 + (state.powerups.energyGain * 3);
                createParticle(e.x, e.y, '#fbbf24', 5);
                state.enemies.splice(j, 1);

                if (state.energy >= state.maxEnergy) {
                    state.energy = state.maxEnergy;
                    triggerQuestionPhase();
                    return; 
                }
            }
        }
    }
    
    state.particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.life -= 0.05; });
    state.particles = state.particles.filter(p => p.life > 0);

    // --- COLLISIONS ---
    for (let i = state.bullets.length - 1; i >= 0; i--) {
      let b = state.bullets[i];
      let hit = false;
      for (let j = state.enemies.length - 1; j >= 0; j--) {
        let e = state.enemies[j];
        if (Math.abs(b.x - e.x) < (b.w/2 + e.w/2) && Math.abs(b.y - e.y) < (b.h/2 + e.h/2)) {
          e.hp -= b.dmg;
          if (state.powerups.poison > 0) e.poisoned = true; 

          hit = true;
          createParticle(b.x, b.y, state.powerups.poison > 0 ? '#84cc16' : '#22d3ee', 3); 
          
          if (e.hp <= 0) {
            createParticle(e.x, e.y, e.type === 'tank' ? '#ef4444' : '#a855f7', 15);
            state.score += (e.maxHp * 10) * (1 + state.powerups.scoreMulti * 0.05);
            state.kills++;
            
            if (Math.random() < state.powerups.leech * 0.01) {
                state.player.hp = Math.min(state.player.maxHp, state.player.hp + 1);
            }

            state.enemiesToNextLevel--;
            if (state.enemiesToNextLevel <= 0) {
                state.level++;
                state.enemiesToNextLevel = 10 * state.level;
            }

            if (playModeRef.current === 'normal') {
                state.enemies.splice(j, 1);
                triggerGodModeUpgrades();
                return;
            } else {
                // AUTO-COLLECT
                state.energy += 35 + (state.powerups.energyGain * 3);
                createParticle(e.x, e.y, '#fbbf24', 5);
                state.enemies.splice(j, 1);

                if (state.energy >= state.maxEnergy) {
                    state.energy = state.maxEnergy;
                    triggerQuestionPhase();
                    return; 
                }
            }
          }
          break; 
        }
      }
      if (hit) state.bullets.splice(i, 1);
    }

    for (let i = state.enemyBullets.length - 1; i >= 0; i--) {
        let b = state.enemyBullets[i];
        if (Math.abs(b.x - state.player.x) < (state.player.w/2 + b.w/2) && Math.abs(b.y - state.player.y) < (state.player.h/2 + b.h/2)) {
            state.player.hp -= b.dmg;
            createParticle(state.player.x, state.player.y, '#ef4444', 15);
            state.enemyBullets.splice(i, 1);
            
            if (state.player.hp <= 0) {
                engine.current.isActive = false;
                syncUI();
                setGameState('gameover');
                return;
            }
        }
    }

    for (let j = state.enemies.length - 1; j >= 0; j--) {
        let e = state.enemies[j];
        if (Math.abs(state.player.x - e.x) < (state.player.w/2 + e.w/2) && Math.abs(state.player.y - e.y) < (state.player.h/2 + e.h/2)) {
            state.player.hp--;
            createParticle(state.player.x, state.player.y, '#ef4444', 20);
            state.enemies.splice(j, 1); 
            
            if (state.player.hp <= 0) {
                engine.current.isActive = false;
                syncUI();
                setGameState('gameover');
                return;
            }
        }
    }

    state.enemies = state.enemies.filter(e => e.y < state.height + 50);

    // 2. DRAWING
    ctx.fillStyle = '#020617'; 
    ctx.fillRect(0, 0, state.width, state.height);

    ctx.fillStyle = '#ffffff';
    state.stars.forEach(s => {
        s.y += s.speed;
        if (s.y > state.height) { s.y = 0; s.x = Math.random() * state.width; }
        ctx.globalAlpha = Math.random() * 0.5 + 0.2;
        ctx.fillRect(s.x, s.y, s.size, s.size);
    });
    ctx.globalAlpha = 1.0;

    ctx.fillStyle = state.powerups.poison > 0 ? '#84cc16' : (state.powerups.damage > 0 ? '#fb923c' : '#22d3ee'); 
    state.bullets.forEach(b => {
        ctx.shadowBlur = 5;
        ctx.shadowColor = ctx.fillStyle;
        ctx.fillRect(b.x - b.w/2, b.y - b.h/2, b.w, b.h);
        ctx.shadowBlur = 0;
    });

    ctx.fillStyle = '#ef4444'; 
    state.enemyBullets.forEach(b => {
        ctx.shadowBlur = 8;
        ctx.shadowColor = '#ef4444';
        ctx.fillRect(b.x - b.w/2, b.y - b.h/2, b.w, b.h);
        ctx.shadowBlur = 0;
    });

    state.enemies.forEach(e => {
        ctx.fillStyle = e.type === 'tank' ? '#991b1b' : '#6b21a8'; 
        ctx.strokeStyle = e.type === 'tank' ? '#ef4444' : '#d8b4fe';
        
        if (e.poisoned && state.frameCount % 20 < 10) {
            ctx.fillStyle = '#4d7c0f'; 
            ctx.strokeStyle = '#84cc16'; 
        }

        ctx.lineWidth = 2;
        ctx.beginPath();
        if (e.type === 'tank') {
            ctx.rect(e.x - e.w/2, e.y - e.h/2, e.w, e.h);
        } else {
            ctx.moveTo(e.x - e.w/2, e.y - e.h/2);
            ctx.lineTo(e.x + e.w/2, e.y - e.h/2);
            ctx.lineTo(e.x, e.y + e.h/2);
            ctx.closePath();
        }
        ctx.fill();
        ctx.stroke();

        if (e.type === 'tank' && e.hp < e.maxHp) {
            ctx.fillStyle = '#ef4444';
            ctx.fillRect(e.x - e.w/2, e.y - e.h/2 - 8, e.w * (e.hp/e.maxHp), 4);
        }
    });

    state.particles.forEach(p => {
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.life;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
        ctx.fill();
    });
    ctx.globalAlpha = 1.0;

    // Player
    ctx.save();
    ctx.translate(state.player.x, state.player.y);
    ctx.fillStyle = '#1e3a8a'; 
    ctx.strokeStyle = '#60a5fa'; 
    ctx.lineWidth = 2;
    ctx.shadowBlur = 15;
    ctx.shadowColor = '#60a5fa';
    
    ctx.beginPath();
    ctx.moveTo(0, -state.player.h/2); 
    ctx.lineTo(state.player.w/2, state.player.h/2); 
    ctx.lineTo(-state.player.w/2, state.player.h/2); 
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    
    ctx.fillStyle = '#fbbf24';
    ctx.beginPath();
    ctx.arc(0, state.player.h/2 + 5, 4 + Math.random()*2, 0, Math.PI*2);
    ctx.fill();
    
    ctx.restore();

    // 3. Throttle UI Syncs
    if (state.frameCount % 6 === 0) {
        syncUI();
    }
  }, [syncUI, triggerQuestionPhase, triggerGodModeUpgrades]);

  // --- STABLE PERSISTENT GAME LOOP INITIATOR (Prevents duplicates and control freezing) ---
  const gameLoopRef = useRef();
  gameLoopRef.current = gameLoop;

  useEffect(() => {
    let animationFrameId;
    const loop = () => {
      if (engine.current.isActive) {
        gameLoopRef.current();
      }
      animationFrameId = requestAnimationFrame(loop);
    };
    animationFrameId = requestAnimationFrame(loop);
    return () => {
      cancelAnimationFrame(animationFrameId);
    };
  }, []);

  // --- INPUT HANDLING ---
  useEffect(() => {
    const handleKeyDown = (e) => {
      const key = e.key.toLowerCase();
      if (['arrowup', 'arrowdown', 'arrowleft', 'arrowright', ' '].includes(key)) {
        e.preventDefault(); 
      }
      engine.current.keys[key] = true;
      engine.current.keys[e.key] = true; // backward compatibility
    };
    const handleKeyUp = (e) => {
      const key = e.key.toLowerCase();
      engine.current.keys[key] = false;
      engine.current.keys[e.key] = false;
    };

    window.addEventListener('keydown', handleKeyDown, { passive: false });
    window.addEventListener('keyup', handleKeyUp);

    return () => {
      window.removeEventListener('keydown', handleKeyDown);
      window.removeEventListener('keyup', handleKeyUp);
    };
  }, []);

  // --- EVENT HANDLERS ---
  const handleStartSelectInit = () => {
    // Generate 10 randomized non-duplicate starting powerups
    const pool = [...AVAILABLE_POWERUPS];
    const picked = [];
    for (let i = 0; i < 10; i++) {
      if (pool.length === 0) break;
      const randIdx = Math.floor(Math.random() * pool.length);
      picked.push(pool[randIdx]);
      pool.splice(randIdx, 1);
    }
    setStartOfferedPowerUps(picked);
    setGameState('start-select');
  };

  const handleStartPowerUpSelect = (powerUp) => {
    // Initialize standard core game state
    engine.current = {
      ...engine.current,
      score: 0,
      energy: 0,
      maxEnergy: 50,
      level: 1,
      enemiesToNextLevel: 10,
      kills: 0,
      player: { x: 400, y: 500, w: 30, h: 40, speed: 5, hp: 5, maxHp: 5, shootCooldown: 0, baseFireRate: 15 },
      powerups: { 
        damage: 0, rapid: 0, speed: 0, hull: 0, poison: 0, autoAim: 0,
        bulletSize: 0, bulletSpeed: 0, spread: 0, backShot: 0, sideShot: 0, 
        energyGain: 0, shrink: 0, regen: 0, slowEnemies: 0, weakEnemies: 0, 
        slowEnemyBullets: 0, scoreMulti: 0, diagonal: 0, pacify: 0, leech: 0 
      },
      bullets: [],
      enemyBullets: [],
      enemies: [],
      particles: [],
      frameCount: 0,
      questionQueue: [...allQuestions].sort(() => 0.5 - Math.random())
    };

    // Apply the chosen starting powerup
    if (powerUp.id === 'hull') {
      engine.current.player.maxHp += 1;
      engine.current.player.hp = engine.current.player.maxHp;
    }
    engine.current.powerups[powerUp.id] = 1;

    // Synchronize UI view of active upgrades
    setActivePowerUps([{ ...powerUp, count: 1 }]);

    syncUI();
    setGameState('playing');
    engine.current.isActive = true;
  };

  const initGame = () => {
    handleStartSelectInit();
  };

  const handleAnswerSubmit = (index) => {
    if (selectedAnswer !== null) return;
    
    setSelectedAnswer(index);
    const isCorrect = index === currentQuestion.correctAnswer;
    
    if (isCorrect) {
      engine.current.score += 500;
      const newAnswered = questionsAnswered + 1;
      setQuestionsAnswered(newAnswered);

      if (newAnswered >= questionsNeeded) {
          // Provide 3 random unique choices based on dynamic rarity weights scaling with current level (sector)
          const currentLevel = engine.current.level;
          
          const dynamicChances = {
            Common: Math.max(10, BASE_DROP_CHANCES.Common - (currentLevel - 1) * 7),
            Uncommon: Math.max(15, BASE_DROP_CHANCES.Uncommon - (currentLevel - 1) * 2),
            Rare: BASE_DROP_CHANCES.Rare + (currentLevel - 1) * 2,
            Epic: BASE_DROP_CHANCES.Epic + (currentLevel - 1) * 2.5,
            Legendary: BASE_DROP_CHANCES.Legendary + (currentLevel - 1) * 1.8,
            Mythical: BASE_DROP_CHANCES.Mythical + (currentLevel - 1) * 1.5
          };

          let pool = [...AVAILABLE_POWERUPS];
          let picked = [];
          
          for (let i = 0; i < 3; i++) {
              if (pool.length === 0) break;
              
              let totalWeight = pool.reduce((sum, item) => sum + dynamicChances[item.rarity], 0);
              let randomNum = Math.random() * totalWeight;
              let currentWeight = 0;
              
              for (let j = 0; j < pool.length; j++) {
                  currentWeight += dynamicChances[pool[j].rarity];
                  if (randomNum <= currentWeight) {
                      picked.push(pool[j]);
                      pool.splice(j, 1); // Remove to prevent duplicates
                      break;
                  }
              }
          }
          
          setOfferedPowerUps(picked);
          setGameState('powerup-select');
      } else {
          // Need to answer more questions to unlock!
          setInterFeedback({
              title: "CORRECT!",
              desc: `Authorization partial. ${questionsNeeded - newAnswered} more correct answer(s) required.`,
              type: 'success'
          });
          setGameState('inter-question');
          setTimeout(loadNextQuestion, 1500);
      }
    } else {
      // Wrong answer! Don't reset streak/answered progress, just delay them with a new question.
      setInterFeedback({
          title: "INCORRECT!",
          desc: "Authorization denied. Safety protocols active: loading a different question...",
          type: 'error'
      });
      setGameState('inter-question');
      setTimeout(loadNextQuestion, 2200);
    }
  };

  const handlePowerUpSelect = (powerUp) => {
      setGrantedPowerUp(powerUp);
      
      // APPLY STACKING POWERUP LOGIC
      if (powerUp.id === 'hull') {
          engine.current.player.maxHp += 1;
          engine.current.player.hp = Math.min(engine.current.player.hp + 1, engine.current.player.maxHp);
      }
      
      engine.current.powerups[powerUp.id] = (engine.current.powerups[powerUp.id] || 0) + 1;

      // Update UI state for HUD
      setActivePowerUps(prev => {
          const existing = prev.find(p => p.id === powerUp.id);
          if (existing) {
              return prev.map(p => p.id === powerUp.id ? {...p, count: p.count + 1} : p);
          }
          return [...prev, {...powerUp, count: 1}];
      });
      
      if (playModeRef.current === 'normal') {
          if (godPicks > 1) {
              setGodPicks(prev => prev - 1);
              generateGodPowerups();
              return;
          } else {
              setGodPicks(0);
              setGameState('playing');
              engine.current.isActive = true;
              return;
          }
      }

      setFeedback({
        title: "UPGRADE AUTHORIZED!",
        desc: currentQuestion.explanation,
        type: 'success'
      });
      setGameState('feedback');
  };

  const pauseGame = () => {
    engine.current.isActive = false;
    setGameState('paused');
  };

  const resumeGame = () => {
    setGameState('playing');
    engine.current.isActive = true;
  };

  // Add keyboard listener for pausing
  useEffect(() => {
    const handlePauseKey = (e) => {
      const key = e.key.toLowerCase();
      if (key === 'p' || e.key === 'Escape') {
        if (gameState === 'playing') {
          pauseGame();
        } else if (gameState === 'paused') {
          resumeGame();
        }
      }
    };
    window.addEventListener('keydown', handlePauseKey);
    return () => window.removeEventListener('keydown', handlePauseKey);
  }, [gameState]);

  return (
    <div className="min-h-screen bg-slate-900 text-slate-100 font-sans flex flex-col items-center justify-center p-2 relative">
      
      <div className="max-w-4xl w-full relative">
        
        {/* START SCREEN overlay */}
        {gameState === 'start' && (
          <div className="absolute inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/90 backdrop-blur-sm rounded-xl">
            <div className="bg-slate-800 border-2 border-cyan-500/50 p-8 rounded-2xl shadow-2xl text-center max-w-xl w-full">
              <Rocket size={64} className="mx-auto text-cyan-400 mb-4 animate-bounce" />
              <h1 className="text-4xl font-black mb-2 text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 uppercase tracking-tight">
                Astro-Quest ARCADE
              </h1>
              <p className="text-cyan-200 mb-6 text-lg">Use Arrow Keys (or WASD) to move and dodge lasers.</p>
              
              <div className="flex flex-col gap-3 mb-8 w-full max-w-sm mx-auto">
                <button 
                  onClick={() => handleModeChange('normal')}
                  className={`py-3 px-6 rounded-xl font-bold border-2 transition-all flex items-center justify-between ${playMode === 'normal' ? 'bg-cyan-600/20 border-cyan-400 text-cyan-100 shadow-[0_0_15px_rgba(34,211,238,0.3)]' : 'bg-slate-900 border-slate-700 text-slate-400 opacity-60 hover:opacity-100'}`}
                >
                  <div className="flex items-center gap-3">
                    <Zap className={playMode === 'normal' ? 'text-yellow-400' : ''} />
                    <span>NORMAL MODE</span>
                  </div>
                  {playMode === 'normal' && <div className="w-3 h-3 bg-cyan-400 rounded-full animate-pulse"></div>}
                </button>
                <button 
                  onClick={() => handleModeChange('study')}
                  className={`py-3 px-6 rounded-xl font-bold border-2 transition-all flex items-center justify-between ${playMode === 'study' ? 'bg-purple-600/20 border-purple-400 text-purple-100 shadow-[0_0_15px_rgba(192,132,252,0.3)]' : 'bg-slate-900 border-slate-700 text-slate-400 opacity-60 hover:opacity-100'}`}
                >
                  <div className="flex items-center gap-3">
                    <Globe2 className={playMode === 'study' ? 'text-cyan-400' : ''} />
                    <span>STUDY MODE</span>
                  </div>
                  {playMode === 'study' && <div className="w-3 h-3 bg-purple-400 rounded-full animate-pulse"></div>}
                </button>
              </div>

              <div className="text-left space-y-4 mb-8 bg-slate-900/50 p-4 rounded-xl border border-slate-700">
                {playMode === 'normal' ? (
                  <div className="flex items-center gap-3">
                    <Zap className="text-yellow-400 shrink-0" />
                    <span className="text-sm">Kill enemies to trigger <strong className="text-white">5 massive micro-upgrades</strong> instantly. No questions asked.</span>
                  </div>
                ) : (
                  <div className="flex items-center gap-3">
                    <BatteryCharging className="text-purple-400 shrink-0" />
                    <span className="text-sm">Charge your core to unlock upgrades by answering <strong className="text-white">Astro-Physics trivia</strong>.</span>
                  </div>
                )}
              </div>

              <button onClick={initGame} className="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-4 rounded-xl text-xl flex justify-center items-center gap-2 transition-all hover:scale-105">
                <Play fill="currentColor" /> {playMode === 'normal' ? 'INITIALIZE COMBAT' : 'START STUDY MISSION'}
              </button>
            </div>
          </div>
        )}

        {/* START SCREEN POWER-UP SELECTION */}
        {gameState === 'start-select' && (
          <div className="absolute inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/95 backdrop-blur-md rounded-xl">
            <div className="bg-slate-800 border border-cyan-500 p-6 md:p-8 rounded-2xl shadow-[0_0_30px_rgba(6,182,212,0.3)] max-w-4xl w-full animate-fade-in-up">
              <div className="text-center mb-6">
                <Rocket size={48} className="mx-auto text-cyan-400 mb-2 animate-pulse" />
                <h2 className="text-2xl md:text-3xl font-black uppercase tracking-wider text-cyan-400">CHOOSE STARTING CHASSIS</h2>
                <p className="text-slate-300 mt-1">Select one free micro-upgrade to initialize your spaceship's systems:</p>
              </div>

              <div className="grid grid-cols-2 md:grid-cols-5 gap-3 max-h-[420px] overflow-y-auto p-2 scrollbar-thin">
                {startOfferedPowerUps.map(powerUp => {
                  const style = RARITY_COLORS[powerUp.rarity];
                  return (
                    <button 
                      key={powerUp.id}
                      onClick={() => handleStartPowerUpSelect(powerUp)}
                      className={`${style.bg} border-2 ${style.border} ${style.glow} p-3 rounded-lg flex flex-col items-center text-center transition-all duration-300 hover:scale-105 group relative`}
                    >
                      <span className={`absolute top-1 right-1 text-[8px] uppercase font-black px-1.5 py-0.5 rounded-full border ${style.border} ${style.text} bg-slate-950/80 shadow-md`}>
                        {powerUp.rarity}
                      </span>
                      <div className="text-3xl mb-2 mt-2 group-hover:scale-110 transition-transform drop-shadow-lg">{powerUp.icon}</div>
                      <h3 className={`font-bold text-xs mb-1 ${style.text} line-clamp-1 drop-shadow-sm`}>{powerUp.name}</h3>
                      <p className="text-slate-300 text-[10px] leading-tight line-clamp-2">{powerUp.desc}</p>
                    </button>
                  );
                })}
              </div>
            </div>
          </div>
        )}

        {/* QUESTION SCREEN */}
        {gameState === 'question' && currentQuestion && (
           <div className="absolute inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/95 backdrop-blur-md rounded-xl">
             <div className="bg-slate-800 border border-cyan-700 p-6 md:p-8 rounded-2xl shadow-2xl max-w-2xl w-full animate-fade-in-up">
                
                <div className="flex items-center justify-between mb-6">
                    <div className="flex items-center gap-3 text-yellow-400">
                        <BatteryCharging size={28} className="animate-pulse" />
                        <h2 className="text-xl font-bold uppercase tracking-widest">System Charged</h2>
                    </div>
                    {questionsNeeded > 1 && (
                        <div className="bg-slate-900 px-3 py-1 rounded-lg border border-cyan-500/50 text-cyan-300 font-bold text-sm animate-bounce">
                            Phase {questionsAnswered + 1} of {questionsNeeded}
                        </div>
                    )}
                </div>
                
                <div className="mb-6">
                    <span className="text-xs text-cyan-400 uppercase font-bold tracking-widest">{currentQuestion.topic}</span>
                    <h3 className="text-2xl font-semibold mt-1 leading-snug">{currentQuestion.question}</h3>
                </div>

                <div className="space-y-3">
                    {currentQuestion.options.map((opt, idx) => (
                        <button 
                            key={idx} 
                            onClick={() => handleAnswerSubmit(idx)}
                            className="w-full text-left p-4 rounded-xl border border-slate-600 bg-slate-900 hover:border-cyan-500 hover:bg-slate-700 transition-all text-lg font-medium"
                        >
                            {opt}
                        </button>
                    ))}
                </div>
             </div>
           </div>
        )}

        {/* INTER-QUESTION FEEDBACK SCREEN */}
        {gameState === 'inter-question' && interFeedback && (
           <div className="absolute inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/95 backdrop-blur-md rounded-xl">
             <div className={`bg-slate-800 border ${interFeedback.type === 'success' ? 'border-cyan-500' : 'border-red-500'} p-8 rounded-2xl shadow-2xl text-center max-w-md w-full animate-fade-in-up`}>
                 {interFeedback.type === 'success' ? (
                     <CheckCircle2 size={64} className="mx-auto text-cyan-400 mb-4 animate-bounce" />
                 ) : (
                     <XCircle size={64} className="mx-auto text-red-500 mb-4 animate-pulse" />
                 )}
                 <h2 className={`text-3xl font-black uppercase tracking-wider mb-2 ${interFeedback.type === 'success' ? 'text-cyan-400' : 'text-red-500'}`}>
                     {interFeedback.title}
                 </h2>
                 <p className="text-slate-300 text-lg leading-relaxed">{interFeedback.desc}</p>
             </div>
           </div>
        )}

        {/* POWER-UP SELECTION SCREEN */}
        {gameState === 'powerup-select' && (
           <div className="absolute inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/95 backdrop-blur-md rounded-xl overflow-y-auto">
             <div className="bg-slate-800 border border-green-500 p-6 md:p-8 rounded-2xl shadow-[0_0_30px_rgba(34,197,94,0.3)] max-w-5xl w-full animate-fade-in-up my-auto">
                
                <div className="text-center mb-4">
                    <CheckCircle2 size={64} className="mx-auto text-green-400 mb-2" />
                    <h2 className="text-3xl font-black uppercase tracking-wider text-green-400">
                        {playMode === 'normal' ? `COMBAT UPGRADE: PICK ${godPicks} ITEMS` : "STUDY COMPLETE: PICK AN UPGRADE"}
                    </h2>
                    <p className="text-slate-300 mt-2">Select a micro-upgrade to stack onto your ship:</p>
                    {uiStats.level > 1 && playMode !== 'normal' && (
                      <p className="text-xs text-yellow-400 font-semibold uppercase tracking-wider mt-1 animate-pulse">
                        ⭐ Sector {uiStats.level} Bonus Active: Better Power-up Chances Increased!
                      </p>
                    )}
                </div>

                <div className={`grid gap-4 mb-6 ${godMode ? 'grid-cols-2 md:grid-cols-5' : 'grid-cols-1 md:grid-cols-3'}`}>
                    {offeredPowerUps.map(powerUp => {
                        const currentStack = engine.current.powerups[powerUp.id] || 0;
                        const style = RARITY_COLORS[powerUp.rarity];
                        return (
                        <button 
                            key={powerUp.id}
                            onClick={() => handlePowerUpSelect(powerUp)}
                            className={`${style.bg} border-2 ${style.border} ${style.glow} p-6 rounded-xl flex flex-col items-center text-center transition-all duration-300 hover:scale-105 group relative`}
                        >
                            {currentStack > 0 && (
                                <span className="absolute top-2 left-2 bg-slate-800/80 backdrop-blur text-xs px-2 py-1 rounded-full font-bold border border-slate-600 text-white">
                                    Lvl {currentStack}
                                </span>
                            )}
                            <span className={`absolute top-2 right-2 text-[10px] uppercase font-black px-2 py-1 rounded-full border ${style.border} ${style.text} bg-slate-950/80 shadow-md`}>
                                {powerUp.rarity}
                            </span>
                            <div className="text-5xl mb-4 mt-4 group-hover:scale-110 transition-transform drop-shadow-2xl">{powerUp.icon}</div>
                            <h3 className={`font-bold text-xl mb-2 ${style.text} drop-shadow-md`}>{powerUp.name}</h3>
                            <p className="text-slate-300 text-sm font-medium">{powerUp.desc}</p>
                        </button>
                        );
                    })}
                </div>
             </div>
           </div>
        )}

        {/* FEEDBACK (AFTER UPGRADE) */}
        {gameState === 'feedback' && feedback && (
           <div className="absolute inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/95 backdrop-blur-md rounded-xl">
             <div className={`bg-slate-800 border border-green-500 p-6 md:p-8 rounded-2xl shadow-2xl max-w-2xl w-full animate-fade-in-up`}>
                
                <div className="text-center mb-6">
                    <Zap size={64} className="mx-auto text-yellow-400 mb-2 animate-pulse" />
                    <h2 className="text-3xl font-black uppercase tracking-wider text-green-400">
                        {feedback.title}
                    </h2>
                </div>
                
                {grantedPowerUp && (
                    <div className={`bg-slate-900 border ${RARITY_COLORS[grantedPowerUp.rarity].border} p-4 rounded-xl mb-6 flex items-center justify-center gap-4 shadow-lg`}>
                        <div className="text-4xl drop-shadow-lg">{grantedPowerUp.icon}</div>
                        <div>
                            <h4 className={`font-bold text-lg ${RARITY_COLORS[grantedPowerUp.rarity].text} drop-shadow-sm`}>
                              {grantedPowerUp.name} Installed!
                            </h4>
                        </div>
                    </div>
                )}

                <div className="bg-slate-900 p-5 rounded-xl border-l-4 border-slate-500 mb-8">
                    <span className="text-xs text-slate-400 uppercase font-bold tracking-widest mb-1 block text-left">Study Database Review</span>
                    <p className="text-lg leading-relaxed text-left">{feedback.desc}</p>
                </div>

                <button onClick={resumeGame} className="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-4 rounded-xl text-xl flex justify-center items-center gap-2 transition-all hover:scale-105">
                    RESUME COMBAT <ChevronRight />
                </button>

             </div>
           </div>
        )}

        {/* PAUSE SCREEN */}
        {gameState === 'paused' && (
           <div className="absolute inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/80 backdrop-blur-md rounded-xl">
             <div className="bg-slate-800 border-2 border-cyan-500 p-8 rounded-2xl shadow-2xl text-center max-w-sm w-full animate-fade-in-up">
                <Pause size={64} className="mx-auto text-cyan-400 mb-4" />
                <h2 className="text-4xl font-black text-white mb-8 tracking-widest uppercase">Paused</h2>
                
                <button onClick={resumeGame} className="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-4 rounded-xl text-xl flex justify-center items-center gap-2 transition-all hover:scale-105 mb-4">
                  <Play fill="currentColor" /> RESUME
                </button>
                <button onClick={() => setGameState('start')} className="w-full bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 rounded-xl flex justify-center items-center gap-2 transition-all">
                  <RotateCcw size={18} /> QUIT TO MENU
                </button>
             </div>
           </div>
        )}

        {/* GAME OVER SCREEN */}
        {gameState === 'gameover' && (
            <div className="absolute inset-0 z-50 flex items-center justify-center p-4 bg-red-950/90 backdrop-blur-sm rounded-xl">
               <div className="bg-slate-900 border-2 border-red-500 p-8 rounded-2xl shadow-2xl text-center max-w-md w-full animate-fade-in-up">
                  <AlertTriangle size={64} className="mx-auto text-red-500 mb-4 animate-pulse" />
                  <h2 className="text-4xl font-black text-red-500 mb-2 uppercase">Hull Destroyed</h2>
                  <p className="text-slate-300 mb-6">Your ship was overwhelmed by hostile forces.</p>
                  
                  <div className="bg-slate-800 p-4 rounded-xl mb-6">
                      <div className="text-sm text-slate-400 uppercase font-bold">Final Score</div>
                      <div className="text-3xl font-mono text-white">{uiStats.score.toLocaleString()}</div>
                      <div className="text-xs text-slate-500 mt-2">Reached Sector {uiStats.level}</div>
                  </div>

                  <button onClick={initGame} className="w-full bg-red-600 hover:bg-red-500 text-white font-bold py-4 rounded-xl text-xl flex justify-center items-center gap-2 transition-all">
                    <RotateCcw /> RESTART MISSION
                  </button>
               </div>
            </div>
        )}

        {/* MAIN GAME CONTAINER */}
        <div className="bg-slate-950 rounded-2xl overflow-hidden border border-slate-700 shadow-[0_0_50px_rgba(0,0,0,0.5)] relative">
            
            {/* HUD Overlay */}
            <div className="absolute top-0 left-0 right-0 p-4 flex justify-between items-start z-10 pointer-events-none">
                
                {/* Left side: Health & Level */}
                <div className="flex flex-col gap-2">
                    <div className="bg-slate-900/80 backdrop-blur px-4 py-2 rounded-lg border border-slate-700 flex items-center gap-2 max-w-[250px] flex-wrap">
                        <span className="text-xs font-bold text-slate-400 uppercase tracking-widest w-12">HULL</span>
                        <div className="flex gap-1 flex-wrap">
                            {[...Array(uiStats.maxHp)].map((_, i) => (
                                <Shield key={i} size={16} className={i < uiStats.hp ? "text-green-400" : "text-slate-700"} fill={i < uiStats.hp ? "currentColor" : "none"} />
                            ))}
                        </div>
                    </div>
                    <div className="bg-slate-900/80 backdrop-blur px-4 py-1.5 rounded-lg border border-slate-700 inline-block">
                        <span className="text-xs font-bold text-cyan-400 uppercase tracking-widest">SECTOR {uiStats.level}</span>
                    </div>
                </div>

                {/* Center: Pause Button */}
                {gameState === 'playing' && (
                    <div className="pointer-events-auto">
                        <button 
                            onClick={pauseGame} 
                            className="bg-slate-900/80 backdrop-blur p-2 rounded-lg border border-slate-700 text-slate-400 hover:text-white hover:border-cyan-500 hover:bg-slate-800 transition-all flex items-center justify-center"
                            title="Pause Game (P or Esc)"
                        >
                            <Pause size={24} />
                        </button>
                    </div>
                )}

                {/* Right side: Score & Powerups */}
                <div className="flex flex-col items-end gap-2 pointer-events-auto">
                    <div className="bg-slate-900/80 backdrop-blur px-4 py-2 rounded-lg border border-slate-700 text-right min-w-[120px]">
                        <span className="text-xs font-bold text-slate-400 uppercase tracking-widest block leading-none mb-1">SCORE</span>
                        <span className="text-xl font-mono font-bold text-white leading-none">{uiStats.score.toLocaleString()}</span>
                        <div className="h-px bg-slate-700 my-1.5"></div>
                        <span className="text-xs font-bold text-slate-400 uppercase tracking-widest block leading-none mb-1">KILLS</span>
                        <span className="text-lg font-mono font-bold text-red-400 leading-none">{uiStats.kills}</span>
                    </div>
                    {/* Active Micro-Upgrades View */}
                    {activePowerUps.length > 0 && (
                        <div className="flex flex-wrap justify-end gap-2 max-w-[300px]">
                            {[...activePowerUps].sort((a, b) => RARITY_WEIGHT[b.rarity] - RARITY_WEIGHT[a.rarity]).map(p => {
                                const style = RARITY_COLORS[p.rarity];
                                return (
                                <div key={p.id} className={`relative bg-slate-900/80 backdrop-blur p-1.5 rounded-lg border ${style.border} text-sm md:text-lg cursor-help group`}>
                                    {p.icon}
                                    <span className={`absolute -bottom-2 -right-2 ${style.bg} ${style.text} text-[10px] font-bold w-4 h-4 flex items-center justify-center rounded-full border ${style.border}`}>
                                        {p.count}
                                    </span>
                                    {/* Custom Hover Tooltip */}
                                    <div className="absolute top-full right-0 mt-3 opacity-0 group-hover:opacity-100 transition-opacity duration-200 w-max bg-slate-900/95 backdrop-blur-md border border-slate-700 p-3 rounded-lg shadow-2xl z-50 text-left pointer-events-none">
                                        <div className={`font-bold text-sm ${style.text} drop-shadow-md`}>{p.name}</div>
                                        <div className="text-xs text-slate-300 mt-0.5 font-bold">Level {p.count} • {p.rarity}</div>
                                        <div className="text-xs text-slate-400 mt-1 max-w-[150px] whitespace-normal">{p.desc}</div>
                                    </div>
                                </div>
                                );
                            })}
                        </div>
                    )}
                </div>
            </div>

            {/* Bottom HUD: Energy Bar */}
            <div className="absolute bottom-0 left-0 right-0 p-6 z-10 pointer-events-none">
                <div className="max-w-md mx-auto">
                    <div className="flex justify-between items-end mb-1">
                        <span className="text-xs font-bold text-yellow-400 uppercase tracking-widest drop-shadow-md">Energy Core Charge</span>
                        <span className="text-xs font-bold text-yellow-400 font-mono drop-shadow-md">{Math.floor((uiStats.energy / uiStats.maxEnergy) * 100)}%</span>
                    </div>
                    <div className="h-4 bg-slate-900/80 backdrop-blur rounded-full border border-slate-700 overflow-hidden relative">
                        <div 
                            className="absolute top-0 left-0 bottom-0 bg-gradient-to-r from-yellow-500 to-yellow-300 transition-all duration-200"
                            style={{ width: `${(uiStats.energy / uiStats.maxEnergy) * 100}%` }}
                        >
                            <div className="absolute top-0 bottom-0 left-0 right-0 bg-gradient-to-b from-white/30 to-transparent"></div>
                        </div>
                    </div>
                </div>
            </div>

            {/* THE ACTUAL GAME CANVAS */}
            <canvas 
                ref={canvasRef} 
                width={800} 
                height={600} 
                className="w-full max-w-[800px] h-auto aspect-[4/3] block bg-[#020617]"
                style={{ imageRendering: 'pixelated' }}
            />
        </div>
      </div>

      <style dangerouslySetInnerHTML={{__html: `
        @keyframes fade-in-up {
          0% { opacity: 0; transform: translateY(10px) scale(0.95); }
          100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        .animate-fade-in-up { animation: fade-in-up 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .scrollbar-thin::-webkit-scrollbar {
          width: 6px;
        }
        .scrollbar-thin::-webkit-scrollbar-track {
          background: rgba(15, 23, 42, 0.6);
          border-radius: 4px;
        }
        .scrollbar-thin::-webkit-scrollbar-thumb {
          background: rgba(6, 182, 212, 0.4);
          border-radius: 4px;
        }
        .scrollbar-thin::-webkit-scrollbar-thumb:hover {
          background: rgba(6, 182, 212, 0.8);
        }
      `}} />
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
    <script src="../hub-common.js"></script>
    <a href="../index.html" class="global-hub-btn theme-study">Back to Hub</a>
</body>
</html>
