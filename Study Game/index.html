  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // --- Lucide Icons SVGs (as simple functional components for React) ---
    const Icon = ({ name, size = 24, className = '', fill = 'none' }) => {
        const iconData = lucide.icons[name];
        if (!iconData) return null;
        
        const svgAttrs = {
            xmlns: "http://www.w3.org/2000/svg",
            viewBox: "0 0 24 24",
            width: size,
            height: size,
            className,
            fill,
            stroke: "currentColor",
            strokeWidth: "2",
            strokeLinecap: "round",
            strokeLinejoin: "round",
        };

        const createEl = (node, i) => {
            const [nodeTag, nodeAttrs, nodeChildren] = node;
            return React.createElement(nodeTag, { ...nodeAttrs, key: i }, 
                (nodeChildren || []).map((child, j) => createEl(child, j))
            );
        };

        return React.createElement('svg', svgAttrs, 
            iconData.map((child, i) => createEl(child, i))
        );
    };
    const Rocket = (props) => <Icon name="Rocket" {...props} />;
    const ShieldAlert = (props) => <Icon name="ShieldAlert" {...props} />;
    const BatteryCharging = (props) => <Icon name="BatteryCharging" {...props} />;
    const Flame = (props) => <Icon name="Flame" {...props} />;
    const Play = (props) => <Icon name="Play" {...props} />;
    const CheckCircle2 = (props) => <Icon name="CheckCircle2" {...props} />;
    const XCircle = (props) => <Icon name="XCircle" {...props} />;
    const Zap = (props) => <Icon name="Zap" {...props} />;
    const ChevronRight = (props) => <Icon name="ChevronRight" {...props} />;
    const Pause = (props) => <Icon name="Pause" {...props} />;
    const RotateCcw = (props) => <Icon name="RotateCcw" {...props} />;
    const AlertTriangle = (props) => <Icon name="AlertTriangle" {...props} />;
    const Shield = (props) => <Icon name="Shield" {...props} />;

    const allQuestions = [
  // Original Questions
  { id: 1, topic: "Models of the Universe", question: "Historically, people believed the Earth was the center of the universe. What is the name of this model, and what is the correct model we use today?", options: ["Heliocentric (old) vs. Geocentric (new)", "Geocentric (old) vs. Heliocentric (new)", "Nebular (old) vs. Universal (new)", "Equinox (old) vs. Solstice (new)"], correctAnswer: 1, explanation: "Geo = Earth, Helio = Sun. The Geocentric model placed Earth at the center. The Heliocentric model places the Sun at the center of our solar system!" },
  { id: 2, topic: "Vocabulary", question: "Which of the following is defined as a massive cloud of gas and dust in space, often where new stars are born?", options: ["Galaxy", "Universe", "Nebula", "Black Hole"], correctAnswer: 2, explanation: "A Nebula is a cosmic cloud of gas and dust. A galaxy is a huge collection of gas, dust, and billions of stars." },
  { id: 3, topic: "Distances in Space", question: "If you want to measure the distance from the Earth to the Sun, which unit of measurement is most appropriate?", options: ["Light Year", "Kilometer", "Astronomical Unit (AU)", "Parsec"], correctAnswer: 2, explanation: "1 Astronomical Unit (AU) is exactly the average distance from the Earth to the Sun." },
  { id: 4, topic: "Seasons & Earth's Orbit", question: "What is the primary reason Earth experiences seasons (Summer, Autumn, Winter, Spring)?", options: ["The Earth moves closer to and farther from the Sun.", "The Earth's axis is tilted at a 23.5° angle as it orbits the Sun.", "The Sun's temperature changes throughout the year.", "The Moon blocks the Sun's light during winter."], correctAnswer: 1, explanation: "Earth's 23.5° tilt means different parts of the Earth receive more direct sunlight at different times of the year as it revolves around the Sun." },
  { id: 5, topic: "Seasons & Earth's Orbit", question: "What is the difference between an Equinox and a Solstice?", options: ["Equinox = equal day/night; Solstice = longest/shortest day.", "Solstice = equal day/night; Equinox = longest/shortest day.", "Equinox happens in summer; Solstice happens in winter.", "There is no difference; they are the same thing."], correctAnswer: 0, explanation: "Equinox ('equal night') occurs in Spring and Fall. Solstices occur in Summer and Winter, marking the longest and shortest days." },
  { id: 6, topic: "Solar System Order", question: "Starting from the Sun and moving outward, what is the correct order of the inner rocky planets?", options: ["Venus, Earth, Mercury, Mars", "Mercury, Venus, Earth, Mars", "Mars, Earth, Venus, Mercury", "Mercury, Earth, Venus, Mars"], correctAnswer: 1, explanation: "Remember: 'My Very Educated Mother...' (Mercury, Venus, Earth, Mars)." },
  { id: 7, topic: "Planetary Motion", question: "A 'year' on Mars is almost twice as long as an Earth year. If you are 10 Earth-years old, roughly how old would you be in Mars-years?", options: ["20 years old", "10 years old", "5 years old", "1 year old"], correctAnswer: 2, explanation: "Since a Mars year is twice as long, you divide your Earth age by 2. 10 Earth years is only about 5 Mars years!" },
  { id: 8, topic: "Exoplanet Transit Graphs", question: "You are looking at a light curve graph for a star. If the dip in brightness is VERY DEEP, what does that tell you about the exoplanet orbiting it?", options: ["The planet has a very fast orbit.", "The planet is very hot.", "The planet has a large size (radius).", "The planet has a small size (radius)."], correctAnswer: 2, explanation: "A deeper dip means more of the star's light is being blocked, indicating the transiting exoplanet has a very large radius!" },
  { id: 9, topic: "Exoplanet Transit Graphs", question: "You notice the dips in brightness happen very frequently (e.g., every 3 days). What does this tell you?", options: ["The planet has a short orbital period (it's close to the star).", "The planet has a long orbital period (it's far from the star).", "The star is very small.", "There are multiple planets."], correctAnswer: 0, explanation: "Frequent dips mean a short orbital period, which means it orbits very close to its star." },
  { id: 10, topic: "Cosmic Scale", question: "If a star is 5 'Light Years' away, what does that actually mean?", options: ["It will take 5 years to travel there in a rocket.", "The star is 5 times older than the Sun.", "It takes light 5 years to travel from that star to our eyes.", "The star will burn out in 5 years."], correctAnswer: 2, explanation: "A light year is a measure of distance, not time. It is the distance light travels in one Earth year. We are seeing that star as it looked 5 years ago!" },
  { id: 11, topic: "Solar System Order", question: "Which of the following represents the correct order of the OUTER gas and ice giant planets?", options: ["Saturn, Jupiter, Neptune, Uranus", "Jupiter, Saturn, Uranus, Neptune", "Neptune, Uranus, Saturn, Jupiter", "Jupiter, Uranus, Saturn, Neptune"], correctAnswer: 1, explanation: "After the inner planets, the order continues with the gas giants (Jupiter, Saturn) followed by the ice giants (Uranus, Neptune)." },
  { id: 12, topic: "Planetary Characteristics", question: "Venus is the hottest planet in our solar system, even though Mercury is closer to the Sun. Why?", options: ["Venus has a core made of lava.", "Venus is closer to the Sun during the summer.", "Venus has a thick atmosphere that traps heat (greenhouse effect).", "Mercury has ice on its surface."], correctAnswer: 2, explanation: "Venus's incredibly thick atmosphere is full of carbon dioxide, which traps heat like a giant greenhouse, making it hotter than Mercury!" },
  { id: 13, topic: "Planetary Characteristics", question: "Which planet is known for its extreme tilt, causing it to effectively rotate on its side like a rolling barrel?", options: ["Saturn", "Neptune", "Mars", "Uranus"], correctAnswer: 3, explanation: "Uranus has an axial tilt of about 98°, meaning it orbits the Sun on its side!" },
  { id: 14, topic: "Planetary Characteristics", question: "Why does Mars appear red in the night sky?", options: ["It is covered in volcanoes.", "Its surface contains a lot of iron oxide (rust).", "It is very hot, making it glow.", "Its atmosphere is made of red gas."], correctAnswer: 1, explanation: "Mars is covered in iron oxide dust—the exact same chemical compound that makes rust on Earth!" },
  { id: 15, topic: "Scale Models", question: "If we made a scale model of the solar system where the Earth is the size of a peppercorn, the Sun would roughly be the size of a...", options: ["Golf ball", "Bowling ball", "House", "Car"], correctAnswer: 1, explanation: "The Sun is huge! If Earth were a peppercorn, the Sun would be about the size of a bowling ball (roughly 8 inches across in the model)." },
  { id: 16, topic: "Planetary Motion", question: "Which major planet takes the longest time to orbit the Sun?", options: ["Jupiter", "Uranus", "Neptune", "Saturn"], correctAnswer: 2, explanation: "Because Neptune is the furthest major planet from the Sun, it has the largest orbit and moves the slowest. One Neptune year is 165 Earth years!" },
  { id: 17, topic: "Exoplanet Transit Graphs", question: "If a light curve graph shows very SHALLOW dips (not deep at all), what does it suggest about the exoplanet?", options: ["The planet is very large.", "The planet is very small compared to the star.", "The planet has a fast orbit.", "The planet is completely made of gas."], correctAnswer: 1, explanation: "A shallow dip means only a tiny fraction of the star's light is blocked. This means the transiting planet is relatively small." },
  { id: 18, topic: "Exoplanet Transit Graphs", question: "When we use the transit method to find exoplanets, what exactly are we measuring?", options: ["The color of a star changing over time.", "The gravitational pull of a planet.", "The brightness of a star over time.", "The heat signature of a planet."], correctAnswer: 2, explanation: "The transit method measures a star's brightness. When a planet passes (transits) in front of the star, the brightness dips slightly!" },
  { id: 19, topic: "Seasons", question: "During the Summer Solstice in the Northern Hemisphere, which part of Earth is tilted TOWARD the Sun?", options: ["The South Pole", "The Equator", "The North Pole", "None, the Earth is not tilted."], correctAnswer: 2, explanation: "During the Northern Hemisphere's summer, the North Pole is tilted toward the Sun, giving the north longer days and more direct sunlight." },
  { id: 20, topic: "Seasons", question: "If the Earth had NO tilt (0° instead of 23.5°), how would our seasons change?", options: ["Summers would be hotter and winters colder.", "We would not experience seasons.", "Winter would last all year.", "It would randomly change every month."], correctAnswer: 1, explanation: "Without a tilt, every location on Earth would get the same amount of sunlight year-round. We wouldn't have seasons!" },
  { id: 21, topic: "Seasons", question: "During Winter in the Northern Hemisphere, how do the daylight hours compare to Summer?", options: ["There are more daylight hours.", "There are fewer daylight hours.", "Daylight hours stay exactly the same.", "There is no sunlight at all."], correctAnswer: 1, explanation: "Because the Northern Hemisphere is tilted away from the Sun in winter, the Sun's path across the sky is shorter, leading to fewer daylight hours." },
  { id: 22, topic: "Models of the Universe", question: "Who was the famous astronomer that used a telescope to observe Jupiter's moons, providing evidence for the Heliocentric model?", options: ["Isaac Newton", "Albert Einstein", "Galileo Galilei", "Edwin Hubble"], correctAnswer: 2, explanation: "Galileo saw moons orbiting Jupiter, proving that not everything in the universe orbits the Earth! This supported the Heliocentric (Sun-centered) model." },
  { id: 23, topic: "Vocabulary", question: "What is the best definition of a galaxy?", options: ["A single star and its planets.", "A cloud of gas where stars die.", "A massive system of stars, gas, dust, and dark matter bound together by gravity.", "The entire known universe."], correctAnswer: 2, explanation: "A galaxy is a massive collection of stars, dust, and gas held together by gravity. Our galaxy is the Milky Way!" },
  { id: 24, topic: "Cosmic Scale", question: "Place these objects in order from SMALLEST to LARGEST:", options: ["Planet, Star, Galaxy, Universe", "Star, Planet, Universe, Galaxy", "Galaxy, Universe, Planet, Star", "Universe, Galaxy, Star, Planet"], correctAnswer: 0, explanation: "Planets orbit Stars. Billions of Stars make up a Galaxy. Billions of Galaxies make up the Universe!" },
  { id: 25, topic: "Distances in Space", question: "Why do astronomers use Astronomical Units (AU) instead of kilometers to measure distances within the solar system?", options: ["Kilometers are only used for driving cars.", "AU is more accurate than kilometers.", "Kilometers are too small, making the numbers massive and hard to work with.", "AU is the only measurement recognized by aliens."], correctAnswer: 2, explanation: "Space is incredibly vast. Using kilometers for space distances would require writing out billions or trillions, so astronomers use larger units like AU to simplify the math." },
  { id: 26, topic: "Planetary Motion", question: "Mercury is the closest planet to the Sun. How does this affect its orbital period (its 'year') compared to Earth?", options: ["It has a much longer orbital period.", "It has a much shorter orbital period.", "Its orbital period is the same as Earth's.", "Mercury does not have an orbit."], correctAnswer: 1, explanation: "Because it's so close to the Sun, Mercury has a shorter distance to travel and moves faster due to stronger gravity. A year on Mercury is only 88 Earth days!" },
  { id: 27, topic: "Planetary Motion", question: "Jupiter takes about 12 Earth years to orbit the Sun once. If you are 12 years old on Earth, how old are you in 'Jupiter years'?", options: ["1 year old", "12 years old", "24 years old", "144 years old"], correctAnswer: 0, explanation: "If you have lived on Earth for 12 years, Jupiter has only completed exactly one trip around the Sun. You are 1 Jupiter-year old!" },
  { id: 28, topic: "Planetary Characteristics", question: "Which planet is closest to the Sun but is incredibly cold on its night side because it has no atmosphere to hold in heat?", options: ["Venus", "Mars", "Mercury", "Earth"], correctAnswer: 2, explanation: "Mercury has basically no atmosphere. So while the day side cooks, the night side freezes solid because there's no air to trap the heat!" },
  { id: 29, topic: "Exoplanet Transit Graphs", question: "Why is it easier to find large, Jupiter-sized exoplanets that orbit close to their stars using the transit method?", options: ["They shine brighter than the star.", "They block out a lot of light and transit frequently.", "They are the only planets that exist.", "They emit a special radio signal."], correctAnswer: 1, explanation: "Large planets block more light (making a deeper dip to see), and if they are close to their star, they transit often, giving scientists more chances to spot the dip!" },
  { id: 30, topic: "Seasons", question: "When it is Spring in the Northern Hemisphere, what season is it in the Southern Hemisphere?", options: ["Summer", "Winter", "Spring", "Autumn (Fall)"], correctAnswer: 3, explanation: "The seasons in the Northern and Southern Hemispheres are always opposite. When we have Spring, they have Autumn!" },
  { id: 31, topic: "Models of the Universe", question: "In the ancient Geocentric model, what was believed to be the center of the universe?", options: ["The Sun", "The Earth", "The Moon", "Jupiter"], correctAnswer: 1, explanation: "Geo = Earth. Ancient astronomers like Ptolemy believed the Earth was stationary at the center of the universe, and everything revolved around it." },
  { id: 32, topic: "Vocabulary", question: "What exactly is an 'exoplanet'?", options: ["A planet that has exploded.", "A planet inside our solar system without a moon.", "A dwarf planet like Pluto.", "A planet that orbits a star OUTSIDE our solar system."], correctAnswer: 3, explanation: "The prefix 'exo' means outside. Exoplanets are planets that orbit stars other than our Sun!" },
  { id: 33, topic: "Advanced Astrophysics", question: "What are the three main types of galaxies classified by Edwin Hubble?", options: ["Spiral, Elliptical, Irregular", "Circular, Triangular, Spherical", "Nebular, Planetary, Stellar", "Active, Dormant, Extinct"], correctAnswer: 0, explanation: "Edwin Hubble classified galaxies based on their shapes into Spiral (like our Milky Way), Elliptical (oval-shaped), and Irregular (no distinct shape)." },
  { id: 34, topic: "Planetary Motion", question: "According to Kepler's First Law, what is the shape of a planetary orbit around the Sun?", options: ["A perfect circle", "A figure-eight", "An ellipse, with the Sun at one focus", "A straight line"], correctAnswer: 2, explanation: "Johannes Kepler discovered that orbits are not perfectly circular; they are elliptical, with the Sun slightly off-center at one of the focal points." },
  { id: 35, topic: "Stellar Life Cycles", question: "What is the primary process that powers the Sun and other main-sequence stars?", options: ["Chemical combustion of oxygen", "Friction from gravity", "Nuclear fission of uranium", "Nuclear fusion of hydrogen into helium"], correctAnswer: 3, explanation: "Stars generate massive amounts of energy by crushing hydrogen atoms together under extreme heat and pressure to form helium, a process called nuclear fusion." },
  { id: 36, topic: "Solar System Structure", question: "What is the Oort Cloud?", options: ["A storm system on Jupiter", "A spherical shell of icy objects at the outermost reaches of the solar system", "The asteroid belt between Mars and Jupiter", "A massive nebula where the Sun was born"], correctAnswer: 1, explanation: "The Oort Cloud is a massive, theoretical spherical cloud of icy debris surrounding our solar system, extending light-years away. It's the source of long-period comets!" },
  { id: 37, topic: "Advanced Astrophysics", question: "Which phenomenon provides strong evidence that the universe is currently expanding?", options: ["The redshift of light from distant galaxies", "The changing phases of the Moon", "The occurrence of solar flares", "The formation of black holes"], correctAnswer: 0, explanation: "As galaxies move away from us due to the expanding universe, their light waves stretch out, shifting them toward the red end of the light spectrum (redshift)." },
  { id: 38, topic: "Stellar Life Cycles", question: "What happens to a massive star (much larger than our Sun) at the very end of its life cycle?", options: ["It turns into a planet", "It explodes in a supernova and may become a black hole or neutron star", "It slowly cools down and becomes a white dwarf", "It splits into two smaller stars"], correctAnswer: 1, explanation: "When massive stars run out of fuel, their core collapses and triggers a massive explosion called a supernova, leaving behind either a dense neutron star or a black hole." },
  { id: 39, topic: "Exoplanets", question: "What is a 'Habitable Zone' (or Goldilocks Zone) around a star?", options: ["An area filled with breathable oxygen", "A region where gravity is exactly like Earth's", "The region where conditions are just right for liquid water to exist on a planet's surface", "An area safe from asteroids"], correctAnswer: 2, explanation: "The Habitable Zone is the distance from a star where it's not too hot and not too cold, allowing liquid water (a key ingredient for life) to potentially exist." },
  { id: 40, topic: "Planetary Characteristics", question: "Why do gas giants like Jupiter have such incredibly strong magnetic fields?", options: ["Because they are so close to the Sun", "Because they have rapid rotation and deep layers of metallic liquid hydrogen", "Because they are entirely made of iron", "Because they steal magnetic energy from their moons"], correctAnswer: 1, explanation: "Jupiter spins incredibly fast, and deep inside its atmosphere, hydrogen is crushed into a liquid metal state. This churning metallic liquid acts like a massive dynamo, generating a huge magnetic field." },
  { id: 41, topic: "Earth and Moon", question: "What causes the cycle of day and night on Earth?", options: ["The Earth orbiting the Sun", "The Sun moving around the Earth", "The Earth rotating on its own axis", "The Moon blocking the Sun"], correctAnswer: 2, explanation: "Earth spins (rotates) on its axis like a top. It takes 24 hours to complete one spin, giving us day and night!" },
  { id: 42, topic: "Earth and Moon", question: "Why do we see different phases of the Moon?", options: ["The Moon makes its own light and turns it on and off", "Earth's shadow covers the Moon", "The Moon changes shape as it grows", "As the Moon orbits Earth, we see different amounts of its sunlit half"], correctAnswer: 3, explanation: "The Moon reflects sunlight. As it revolves around Earth, the angle of the sunlit side changes from our perspective, creating phases." },
  { id: 43, topic: "Solar System Structure", question: "What is the main difference between an asteroid and a comet?", options: ["Asteroids are made of ice, comets are made of rock", "Asteroids are rocky/metallic, comets are made of ice, dust, and gas", "Comets orbit planets, asteroids orbit the Sun", "Asteroids are found in the Oort cloud"], correctAnswer: 1, explanation: "Asteroids are mostly rocky or metallic, while comets are 'dirty snowballs' made of ice, dust, and frozen gases that form a glowing tail when they get near the Sun." },
  { id: 44, topic: "Gravity and Forces", question: "What invisible force keeps all the planets orbiting the Sun instead of floating away?", options: ["Magnetism", "Friction", "Gravity", "Solar Wind"], correctAnswer: 2, explanation: "Gravity is the attractive force between all objects with mass. The Sun's massive gravity pulls the planets, keeping them perfectly in orbit." },
  { id: 45, topic: "Space Exploration", question: "Why do astronomers put telescopes like the Hubble and James Webb in space?", options: ["To be closer to the stars", "Because there is no gravity in space", "To avoid Earth's atmosphere, which blurs and blocks light", "Because telescopes on Earth are too heavy"], correctAnswer: 2, explanation: "Earth's atmosphere causes stars to twinkle and blocks certain types of light (like ultraviolet and infrared). Space telescopes get a clear, unobstructed view!" },
  { id: 46, topic: "Planetary Characteristics", question: "Why is Pluto classified as a 'Dwarf Planet' instead of a regular planet?", options: ["It is too cold", "It does not have any moons", "It orbits the Sun backwards", "It has not cleared its neighboring region of other objects"], correctAnswer: 3, explanation: "To be a full planet, an object must clear its orbit of other debris. Pluto shares its orbit with many other icy objects in the Kuiper Belt." },
  { id: 47, topic: "Eclipses", question: "What happens during a Solar Eclipse?", options: ["The Earth passes between the Sun and Moon", "The Moon passes between the Earth and the Sun, blocking sunlight", "The Sun turns off for a few minutes", "A comet blocks the Sun"], correctAnswer: 1, explanation: "During a solar eclipse, the Moon's orbit brings it perfectly in line between Earth and the Sun, casting a shadow on Earth." },
  { id: 48, topic: "Eclipses", question: "What happens during a Lunar Eclipse?", options: ["The Moon passes between the Earth and the Sun", "The Earth passes between the Moon and the Sun, casting a shadow on the Moon", "The Moon explodes", "The Sun turns red"], correctAnswer: 1, explanation: "During a lunar eclipse, the Earth is right between the Sun and the Moon. Earth's shadow falls on the Moon, sometimes making it look red!" },
  { id: 49, topic: "Vocabulary", question: "What is a constellation?", options: ["A group of planets in a line", "A group of stars that form a recognizable pattern or picture in the sky", "A dying star", "A galaxy that is very close to ours"], correctAnswer: 1, explanation: "Constellations are human-made patterns of stars in the night sky, like Orion or the Big Dipper, used for navigation and storytelling." },
  { id: 50, topic: "The Sun", question: "What are sunspots?", options: ["Storms on the Sun that are cooler and darker than the surrounding area", "Mountains on the surface of the Sun", "Holes where the Sun's fire has gone out", "Shadows cast by passing planets"], correctAnswer: 0, explanation: "Sunspots are areas of intense magnetic activity on the Sun's surface that are cooler than the surrounding plasma, making them appear dark." },
  { id: 51, topic: "Models of the Universe", question: "When comparing the geocentric and heliocentric models, what is the main difference in their structures?", options: ["Geocentric has no gravity; Heliocentric relies on gravity", "Geocentric places Earth at the center; Heliocentric places the Sun at the center", "Geocentric uses light years; Heliocentric uses AU", "Geocentric says the Earth is flat; Heliocentric says it's round"], correctAnswer: 1, explanation: "The prefix 'Geo' means Earth (Earth-centered), and 'Helio' means Sun (Sun-centered)!" },
  { id: 52, topic: "Exoplanet Transit Graphs", question: "In a transit light curve graph, how can you determine the planet's orbital period (its year)?", options: ["By measuring how deep the dip is", "By seeing how bright the star normally is", "By measuring the time between the start of one dip and the start of the next dip", "By the color of the light curve"], correctAnswer: 2, explanation: "The orbital period is the time it takes the planet to complete one full orbit and cross in front of the star again. This is seen as the time gap between two identical dips!" },
  { id: 53, topic: "Planetary Motion Math", question: "If you are 10 years old on Earth, and you magically move to a planet that takes 2 Earth-years to orbit the Sun, how old are you in that planet's years?", options: ["20 years old", "5 years old", "10 years old", "2 years old"], correctAnswer: 1, explanation: "If one of their years takes TWO of our years, they age half as fast! 10 Earth years / 2 = 5 Planet years." },
  { id: 54, topic: "Scale Models", question: "When building a scale model of the solar system in class, what do we notice about the distances between the outer planets (Jupiter to Neptune)?", options: ["They are evenly spaced like the inner planets", "They are extremely far apart compared to the inner planets", "They are squished very close together", "They share the exact same orbit"], correctAnswer: 1, explanation: "The inner planets (Mercury, Venus, Earth, Mars) are relatively close together, but the distances across the outer solar system are incredibly vast!" },
  { id: 55, topic: "Vocabulary", question: "Which vocabulary word represents the moment when Earth's tilt causes the longest or shortest amount of daylight in the year?", options: ["Solstice", "Equinox", "Eclipse", "Transit"], correctAnswer: 0, explanation: "A Solstice occurs in Summer (longest day) and Winter (shortest day) when the Earth's pole is tilted at its maximum toward or away from the Sun." },
  { id: 56, topic: "Distances in Space", question: "Why do we use the Astronomical Unit (AU) instead of miles or light years to measure distances within our own solar system?", options: ["Because miles are too large and light years are too small", "Because AU is the only unit telescopes understand", "Because miles are too small (creating huge numbers) and light years are too large for our solar system", "Because one AU is exactly the distance to the edge of the galaxy"], correctAnswer: 2, explanation: "An AU (Earth-to-Sun distance) is the perfect 'yardstick' for our solar system. Using miles would give us billions, and using light years would give us tiny fractions." },
  { id: 57, topic: "Exoplanet Transit Graphs", question: "If a transit light curve shows very frequent, quick dips in brightness, what does this tell you about the exoplanet's orbit?", options: ["It has a very short orbital period (it's close to its star)", "It has a very long orbital period (it's far from its star)", "The planet is freezing cold", "The planet has many moons"], correctAnswer: 0, explanation: "Frequent dips mean the planet completes its orbit very quickly, which means it must be orbiting very close to its host star!" },
  { id: 58, topic: "Planetary Characteristics", question: "Which planet is famous for its spectacular, complex ring system and is the 6th planet from the Sun?", options: ["Jupiter", "Uranus", "Neptune", "Saturn"], correctAnswer: 3, explanation: "While all gas giants have rings, Saturn (the 6th planet) has the brightest, most extensive, and most famous ring system made mostly of ice!" },
  { id: 59, topic: "Seasons", question: "What happens to the amount of daylight during an Equinox?", options: ["The day is 24 hours long", "There is no daylight at all", "Daylight and nighttime are almost exactly equal everywhere on Earth", "The Northern Hemisphere gets more daylight than the Southern"], correctAnswer: 2, explanation: "The word 'Equinox' literally means 'equal night'. During this time in Spring and Fall, the Earth's tilt is sideways relative to the Sun, giving us about 12 hours of day and night." },
  { id: 60, topic: "Seasons & Earth's Orbit", question: "If Earth's tilt were to drastically increase from 23.5° to 45°, how would this affect our seasons?", options: ["We would stop having seasons entirely", "Seasons would become much more extreme (hotter summers, colder winters)", "It would always be winter everywhere", "Seasons would flip every month"], correctAnswer: 1, explanation: "A larger tilt means the hemispheres would point even more directly at (or away from) the Sun, making summers boiling hot and winters freezing cold!" },
  { id: 61, topic: "Orbit Extremes", question: "Earth is closest to the Sun at 'Perihelion' and furthest at 'Aphelion'. What is the primary factor that determines these orbital extremes?", options: ["The planet's speed changes dynamically because of solar winds", "The shape of Earth's orbit is slightly elliptical (eccentric) rather than a perfect circle", "The Earth wobbles on its axis every 10,000 years", "The gravitational pull of the Moon squeezes the orbit"], correctAnswer: 1, explanation: "Due to Kepler's First Law, Earth's orbit is an ellipse. This elliptical eccentricity means Earth reaches its closest point (1.47 × 10^8 km) at Perihelion and its furthest point (1.52 × 10^8 km) at Aphelion." },

function App() {

  const [questionsNeeded, setQuestionsNeeded] = useState(1);

  const [offeredPowerUps, setOfferedPowerUps] = useState([]);
