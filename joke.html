<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Dad Jokes</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .joke-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 50px;
            border-radius: 24px;
            text-align: center;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: fadeIn 0.8s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .joke-icon {
            font-size: 3rem;
            margin-bottom: 20px;
            display: block;
        }
        #joke p {
            font-size: 1.5rem;
            line-height: 1.5;
            color: #f8fafc;
            margin-bottom: 30px;
            font-weight: 400;
            font-style: italic;
        }
        #newJokeButton {
            background: linear-gradient(135deg, #38bdf8 0%, #a78bfa 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3);
        }
        #newJokeButton:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(56, 189, 248, 0.5);
            filter: brightness(1.1);
        }
        h1 {
            font-size: 1.2rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="joke-container">
        <h1>Daily Dose of Humor</h1>
        <span class="joke-icon">🎭</span>
        <div id="joke">
            <p>Ready for a laugh?</p>
        </div>
        <button id="newJokeButton">GENERATE PUNCHLINE</button>
    </div>

    <script src="jokes.js"></script>

    <!-- Global Hub Navigation -->
    <style>
        .global-hub-btn {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: linear-gradient(135deg, #00f2ff 0%, #0077ff 100%);
            color: white !important;
            text-decoration: none !important;
            padding: 14px 28px;
            border-radius: 50px;
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            font-weight: 800;
            font-size: 13px;
            letter-spacing: 1.5px;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
            z-index: 1000000;
            border: 2px solid rgba(255, 255, 255, 0.8);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            gap: 10px;
            text-transform: uppercase;
            cursor: pointer;
        }
        .global-hub-btn:hover {
            transform: scale(1.1) translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 242, 255, 0.6);
            background: linear-gradient(135deg, #0077ff 0%, #00f2ff 100%);
            border-color: #fff;
        }
        .global-hub-btn::before {
            content: '🏠';
            font-size: 18px;
        }
    </style>
    <a href="index.html" class="global-hub-btn">Back to Hub</a>
</body>
</html>
