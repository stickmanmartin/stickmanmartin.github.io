<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comedy Core</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
    body { margin: 0; overflow: hidden; background: #0a0a0c; }
    canvas { display: block; width: 100vw; height: 100vh; }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .joke-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 50px;
            border-radius: 24px;
            text-align: center;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: fadeIn 0.8s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .joke-icon {
            font-size: 3rem;
            margin-bottom: 20px;
            display: block;
        }
        #joke p {
            font-size: 1.5rem;
            line-height: 1.5;
            color: #f8fafc;
            margin-bottom: 30px;
            font-weight: 400;
            font-style: italic;
        }
        #newJokeButton {
            background: linear-gradient(135deg, #38bdf8 0%, #a78bfa 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3);
        }
        #newJokeButton:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(56, 189, 248, 0.5);
            filter: brightness(1.1);
        }
        h1 {
            font-size: 1.2rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 10px;
        }
    </style>

    <link rel="stylesheet" href="hub-common.css">
</head>
<body>
    <div class="joke-container">
        <h1>Daily Dose of Humor</h1>
        <span class="joke-icon">🎭</span>
        <div id="joke">
            <p>Ready for a laugh?</p>
        </div>
        <button id="newJokeButton">GENERATE PUNCHLINE</button>
    </div>

    <script src="jokes.js"></script>

<!-- Global Hub Navigation -->

    <script src="hub-common.js"></script>
    <a href="index.html" class="global-hub-btn theme-art">Back to Hub</a>
</body>
</html>
