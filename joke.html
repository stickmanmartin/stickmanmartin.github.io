<style>
    .global-home-btn {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background-color: #ff0055;
        color: white;
        text-decoration: none;
        padding: 10px 20px;

<!-- Unified Global Home Button -->
<style>
    .global-home-btn {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: linear-gradient(135deg, #ff0055 0%, #ff4d88 100%);
        color: white !important;
        text-decoration: none !important;
        padding: 12px 24px;
        border-radius: 50px;
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        font-weight: 800;
        font-size: 14px;
        letter-spacing: 1px;
        box-shadow: 0 4px 15px rgba(255, 0, 85, 0.4);
        z-index: 999999;
        border: 2px solid #fff;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        gap: 8px;
        text-transform: uppercase;
    }
    .global-home-btn:hover {
        transform: scale(1.1) translateY(-3px);
        box-shadow: 0 6px 20px rgba(255, 0, 85, 0.6);
        filter: brightness(1.1);
    }
    .global-home-btn:active {
        transform: scale(0.95);
    }
</style>

<a href="index.html" class="global-home-btn">🏠 BACK TO HUB</a>
</body>
