    <style>
    body { margin: 0; overflow: hidden; background: #0a0a0c; }
    canvas { display: block; width: 100vw; height: 100vh; }

    
    
    

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .joke-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 50px;
            border-radius: 24px;
            text-align: center;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: fadeIn 0.8s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .joke-icon {
            font-size: 3rem;
            margin-bottom: 20px;
            display: block;
        }
        #joke p {
            font-size: 1.5rem;
            line-height: 1.5;
            color: #f8fafc;
            margin-bottom: 30px;
            font-weight: 400;
            font-style: italic;
        }
        #newJokeButton {
            background: linear-gradient(135deg, #38bdf8 0%, #a78bfa 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3);
        }
        #newJokeButton:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(56, 189, 248, 0.5);
            filter: brightness(1.1);
        }
        h1 {
            font-size: 1.2rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 10px;
        }
    </style>








<style>
    #neural-pointer {
        position: fixed;
        width: 32px;
        height: 32px;
        pointer-events: none;
        z-index: 9999999;
        transform: translate(0, 0);
        display: block;
        filter: 
            drop-shadow(0 0 10px var(--rainbow-glow, #38bdf8))
            drop-shadow(0 0 2px #fff) 
            drop-shadow(1px 0 0 #000) 
            drop-shadow(-1px 0 0 #000) 
            drop-shadow(0 1px 0 #000) 
            drop-shadow(0 -1px 0 #000);
    }
    #neural-pointer::before {
        content: '';
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        clip-path: polygon(0% 0%, 100% 70%, 40% 70%, 40% 100%);
        transition: background 0.3s ease;
    }
    
    #neural-pointer.day-mode::before { background: #ffffff; }
    #neural-pointer.night-mode::before { background: #000000; }

    *, html, body, a, button, input, select, textarea, canvas {
        cursor: none !important;
    }
</style>
</head>
<body>
    <div class="joke-container">
        <h1>Daily Dose of Humor</h1>
        <span class="joke-icon">🎭</span>
        <div id="joke">
            <p>Ready for a laugh?</p>
        </div>
        <button id="newJokeButton">GENERATE PUNCHLINE</button>
    </div>

    <script src="jokes.js"></script>

    
    


























<div id="neural-pointer"></div>
<script>
    (function() {
        const pointer = document.getElementById('neural-pointer');
        if (!pointer) return;

        let hue = 0;

        function isDayTime() {
            const hour = new Date().getHours();
            return hour >= 6 && hour < 18;
        }

        function updatePointer() {
            const isDay = isDayTime();
            pointer.classList.toggle('day-mode', isDay);
            pointer.classList.toggle('night-mode', !isDay);

            hue = (hue + 2) % 360;
            // High lightness for daytime to prevent "dark" feel, standard for night
            const lightness = isDay ? 85 : 60; 
            pointer.style.setProperty('--rainbow-glow', `hsl(${hue}, 100%, ${lightness}%)`);
        }

        window.addEventListener('mousemove', (e) => {
            pointer.style.left = e.clientX + 'px';
            pointer.style.top = e.clientY + 'px';
        });

        function animate() {
            updatePointer();
            requestAnimationFrame(animate);
        }
        animate();
    })();
</script>
