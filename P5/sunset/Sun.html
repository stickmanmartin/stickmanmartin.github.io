<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Light Cascade: Detailed Earth System</title>
    <script src="/P5/libraries/p5.min.js"></script>
    <script src="/P5/libraries/p5.sound.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #0a0a0c; cursor: none !important; }
        canvas { display: block; width: 100vw; height: 100vh; cursor: none !important; }

        /* Seasonal UI Sidebar */
        #seasonal-ctrl {
            position: fixed; top: 50%; right: 20px; transform: translateY(-50%);
            background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(56, 189, 248, 0.3);
            padding: 15px; border-radius: 12px; display: flex; flex-direction: column;
            gap: 10px; z-index: 2000000; backdrop-filter: blur(10px); color: white;
            font-family: 'Poppins', sans-serif;
        }
        .ctrl-title { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: #38bdf8; text-align: center; margin-bottom: 5px; }
        .season-btn {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: #94a3b8; padding: 8px 15px; border-radius: 6px; cursor: pointer;
            font-size: 11px; font-weight: 700; transition: all 0.2s; text-align: left;
        }
        .season-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .season-btn.active { 
            background: #38bdf8; color: #0f172a; border-color: #fff; 
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
        }

        /* Standard Hub Navigation */

        /* Neural Pointer */

        *, html, body, a, button { cursor: none !important; }
    </style>
    <link rel="stylesheet" href="../../hub-common.css">
</head>
<body>
    <script src="Sun.js"></script>

    <div id="seasonal-ctrl">
        <span class="ctrl-title">Season_Ctrl</span>
        <button class="season-btn active" onclick="setSeason('SPRING', this)">🌸 Spring</button>
        <button class="season-btn" onclick="setSeason('SUMMER', this)">🌳 Summer</button>
        <button class="season-btn" onclick="setSeason('AUTUMN', this)">🍂 Autumn</button>
        <button class="season-btn" onclick="setSeason('WINTER', this)">❄️ Winter</button>
    </div>

<!-- Global Hub Navigation -->

    <script src="../../hub-common.js"></script>
    <a href="../../index.html" class="global-hub-btn theme-art">Back to Hub</a>
</body>
</html>
