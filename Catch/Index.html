<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith Reflex - Neural Test</title>
    <style>
        :root {
            --bg-day: #f1f5f9;
            --bg-night: #0a0a0c;
            --text-day: #0f172a;
            --text-night: #f8fafc;
        }

        body { 
            margin: 0; 
            overflow: hidden; 
            background: var(--bg-night); 
            font-family: 'Poppins', sans-serif;
            transition: background-color 0.5s ease;
        }
        
        body.day-theme {
            background-color: var(--bg-day) !important;
            color: var(--text-day) !important;
        }
        body.night-theme {
            background-color: var(--bg-night) !important;
            color: var(--text-night) !important;
        }

        canvas { 
            display: block; 
            width: 100vw; 
            height: 100vh; 
        }

        #game-ui {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .bg-title {
            position: absolute;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.03);
            font-size: 12rem;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            text-transform: uppercase;
            margin: 0;
            font-family: 'Poppins', sans-serif;
            z-index: 0;
        }
        body.day-theme .bg-title {
            color: rgba(0,0,0,0.03);
        }

        #legend {
            position: absolute;
            top: 150px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 30px;
            background: rgba(0,0,0,0.6);
            padding: 15px 30px;
            border-radius: 50px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        body.day-theme #legend {
            background: rgba(255,255,255,0.8);
            border-color: rgba(0,0,0,0.1);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #fff;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        body.day-theme .legend-item { color: #0f172a; }

        .box {
            width: 16px;
            height: 16px;
            border-radius: 2px;
        }
        .box.hazard { background: #ef4444; box-shadow: 0 0 10px #ef4444; }
        .box.shard { background: #38bdf8; box-shadow: 0 0 10px #38bdf8; clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); }
        .box.repair { background: #10b981; box-shadow: 0 0 10px #10b981; }

    </style>

    <link rel="stylesheet" href="../hub-common.css">
</head>
<body>
    <div id="game-ui">
        <h1 class="bg-title">Zenith</h1>
        <div id="legend">
            <div class="legend-item"><span class="box hazard"></span> Dodge Hazards</div>
            <div class="legend-item"><span class="box shard"></span> Collect Data Shards</div>
            <div class="legend-item"><span class="box repair"></span> System Repair</div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>
    <audio id="coolsound" src="spy-you-died-for-honor.mp3"></audio>
    <audio id="punch" src="punch_u4LmMsr.mp3"></audio>
    <audio id="round2" src="round-2_rWBVI69.mp3"></audio>

    <script src="Catch.js"></script>

<!-- Global Hub Navigation -->

    <script src="../hub-common.js"></script>
    <a href="../index.html" class="global-hub-btn theme-action">Back to Hub</a>
</body>
</html>
