<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith Reflex - Neural Test</title>
    <style>
        :root {
            --bg-day: #f1f5f9;
            --bg-night: #0a0a0c;
            --text-day: #0f172a;
            --text-night: #f8fafc;
        }

        body { 
            margin: 0; 
            overflow: hidden; 
            background: var(--bg-night); 
            font-family: 'Poppins', sans-serif;
            transition: background-color 0.5s ease;
        }
        
        body.day-theme {
            background-color: var(--bg-day) !important;
            color: var(--text-day) !important;
        }
        body.night-theme {
            background-color: var(--bg-night) !important;
            color: var(--text-night) !important;
        }

        canvas { 
            display: block; 
            width: 100vw; 
            height: 100vh; 
        }

        #game-ui {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .bg-title {
            position: absolute;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.03);
            font-size: 12rem;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            text-transform: uppercase;
            margin: 0;
            font-family: 'Poppins', sans-serif;
            z-index: 0;
        }
        body.day-theme .bg-title {
            color: rgba(0,0,0,0.03);
        }

        #legend {
            position: absolute;
            top: 150px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 30px;
            background: rgba(0,0,0,0.6);
            padding: 15px 30px;
            border-radius: 50px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        body.day-theme #legend {
            background: rgba(255,255,255,0.8);
            border-color: rgba(0,0,0,0.1);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #fff;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        body.day-theme .legend-item { color: #0f172a; }

        .box {
            width: 16px;
            height: 16px;
            border-radius: 2px;
        }
        .box.hazard { background: #ef4444; box-shadow: 0 0 10px #ef4444; }
        .box.shard { background: #38bdf8; box-shadow: 0 0 10px #38bdf8; clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); }
        .box.repair { background: #10b981; box-shadow: 0 0 10px #10b981; }

        #neural-pointer {
            position: fixed;
            width: 32px;
            height: 32px;
            pointer-events: none;
            z-index: 9999999;
            transform: translate(0, 0);
            display: block;
            filter: drop-shadow(2px 0 0 #000) drop-shadow(-2px 0 0 #000) drop-shadow(0 2px 0 #000) drop-shadow(0 -2px 0 #000);
        }
        #neural-pointer::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            clip-path: polygon(0% 0%, 100% 70%, 40% 70%, 40% 100%);
            transition: background 0.3s ease;
        }
        #neural-pointer.day-mode::before { background: #ffffff; }
        #neural-pointer.night-mode::before {
            background: #000000;
            box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .global-hub-btn {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: linear-gradient(135deg, #00f2ff 0%, #0077ff 100%);
            color: white !important;
            text-decoration: none !important;
            padding: 14px 28px;
            border-radius: 50px;
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            font-weight: 800;
            font-size: 13px;
            letter-spacing: 1.5px;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
            z-index: 1000000;
            border: 2px solid rgba(255, 255, 255, 0.8);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            gap: 10px;
            text-transform: uppercase;
            cursor: pointer;
        }
        .global-hub-btn:hover {
            transform: scale(1.1) translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 242, 255, 0.6);
            background: linear-gradient(135deg, #0077ff 0%, #00f2ff 100%);
            border-color: #fff;
        }
        .global-hub-btn::before {
            content: '🏠';
            font-size: 18px;
        }

        *, html, body, a, button, input, select, textarea, canvas {
            cursor: none !important;
        }
    </style>

<style>
    #neural-pointer {
        position: fixed;
        width: 32px;
        height: 32px;
        pointer-events: none;
        z-index: 9999999;
        transform: translate(0, 0);
        display: block;
        filter: 
            drop-shadow(0 0 10px var(--rainbow-glow, #38bdf8))
            drop-shadow(0 0 2px #fff) 
            drop-shadow(1px 0 0 #000) 
            drop-shadow(-1px 0 0 #000) 
            drop-shadow(0 1px 0 #000) 
            drop-shadow(0 -1px 0 #000);
    }
    #neural-pointer::before {
        content: '';
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        clip-path: polygon(0% 0%, 100% 70%, 40% 70%, 40% 100%);
        transition: background 0.3s ease;
    }
    
    #neural-pointer.day-mode::before { background: #ffffff; }
    #neural-pointer.night-mode::before { background: #000000; }

    *, html, body, a, button, input, select, textarea, canvas {
        cursor: none !important;
    }
</style>
</head>
<body>
    <div id="game-ui">
        <h1 class="bg-title">Zenith</h1>
        <div id="legend">
            <div class="legend-item"><span class="box hazard"></span> Dodge Hazards</div>
            <div class="legend-item"><span class="box shard"></span> Collect Data Shards</div>
            <div class="legend-item"><span class="box repair"></span> System Repair</div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>
    <audio id="coolsound" src="spy-you-died-for-honor.mp3"></audio>
    <audio id="punch" src="punch_u4LmMsr.mp3"></audio>
    <audio id="round2" src="round-2_rWBVI69.mp3"></audio>
    
    

    <a href="../index.html" class="global-hub-btn">Back to the Hub</a>

    <script src="Catch.js"></script>
    




<div id="neural-pointer"></div>
<script>
    (function() {
        const pointer = document.getElementById('neural-pointer');
        if (!pointer) return;

        let hue = 0;

        function isDayTime() {
            const hour = new Date().getHours();
            return hour >= 6 && hour < 18;
        }

        function updatePointer() {
            const isDay = isDayTime();
            pointer.classList.toggle('day-mode', isDay);
            pointer.classList.toggle('night-mode', !isDay);

            hue = (hue + 2) % 360;
            // High lightness for daytime to prevent "dark" feel, standard for night
            const lightness = isDay ? 85 : 60; 
            pointer.style.setProperty('--rainbow-glow', `hsl(${hue}, 100%, ${lightness}%)`);
        }

        window.addEventListener('mousemove', (e) => {
            pointer.style.left = e.clientX + 'px';
            pointer.style.top = e.clientY + 'px';
        });

        function animate() {
            updatePointer();
            requestAnimationFrame(animate);
        }
        animate();
    })();
</script>
</body>
</html>
